{id:'m8',title:'Pilvi ja verkkoarkkitehtuuri',subtitle:'Cloud security, Zero Trust, palomuurit, VPN',tag:'Pro',tagClass:'tag-red',
theory:[
{title:'Zero Trust -arkkitehtuuri',body:`<strong>Perinteinen perimeter-malli:</strong> Luotetaan kaikkeen sisäverkon sisällä. Ongelmana: insider threat, lateraalinen liike, VPN-murto.

<strong>Zero Trust -periaate:</strong> "Never trust, always verify." Jokainen pyyntö todennetaan ja autorisoidaan erikseen.

<strong>Zero Trust -komponentit:</strong>
– Identity Provider (IdP): Azure AD, Okta
– Policy Engine: Päättää onko pyyntö sallittu
– Micro-segmentation: Pienimmät mahdolliset verkko-oikeudet
– Continuous Monitoring: Jokainen yhteys seurataan
– Least Privilege: Just-in-Time (JIT) -pääsy`},
{title:'Cloud-tietoturva (AWS/Azure)',body:`<strong>Shared Responsibility Model:</strong> Pilvipalveluntarjoaja vastaa infrastruktuurista. Asiakas vastaa datasta, käyttöoikeuksista, sovelluksista ja konfiguraatiosta.

<strong>IAM (Identity and Access Management):</strong>
– Least Privilege kaikille käyttäjille
– Älä käytä root-tiliä arkirutiineihin
– Pakollinen MFA kaikille tileille
– Kiertäviä access key:tä

<strong>Yleisimmät cloud-virheet:</strong>
– Julkinen S3-bucket
– Metadata-palvelu (169.254.169.254): SSRF voi varastaa IAM-tunnukset
– Liian laajat IAM-oikeudet
– Lokit pois päältä`}
],
tasks:[
{id:'m8t1',title:'AWS IAM Policy analyysi',desc:'Luo AWS free tier -tili. Analysoi oletuspolitiikat. Luo minimaalinen IAM-rooli jolla on pääsy vain S3-tiettyyn buckettiin. Testaa että muihin resursseihin ei pääse.',diff:'medium'},
{id:'m8t2',title:'Docker-kontin kovennus',desc:'Ota olemassa oleva Dockerfile. Lisää: non-root käyttäjä, read-only filesystem, poista tarpeettomat capabilities, käytä pienintä mahdollista base imagea (distroless/alpine). Vertaa imagekokoa.',diff:'medium',
solution:`# Alkuperäinen (ei turvallinen)
FROM ubuntu:latest
RUN apt-get update && apt-get install -y python3
COPY app.py /app.py
CMD ["python3", "/app.py"]

# Turvallinen versio
FROM python:3.11-alpine

# Luo ei-root käyttäjä
RUN addgroup -S appgroup && adduser -S appuser -G appgroup

# Kopioi tiedostot
WORKDIR /app
COPY --chown=appuser:appgroup requirements.txt .
RUN pip install --no-cache-dir -r requirements.txt
COPY --chown=appuser:appgroup app.py .

# Vaihda käyttäjään
USER appuser

# Read-only filesystem (docker run --read-only)
# Capabilities rajoitus (docker run --cap-drop=ALL --cap-add=NET_BIND_SERVICE)

CMD ["python3", "app.py"]

# Tarkista: docker scout cves myimage`},
{id:'m8t3',title:'CloudTrail-lokien analysointi',desc:'AWS CloudTrailissa tai paikallisessa lokissa: kirjoita Python-skripti joka analysoi lokit ja hälyttää epäilyttävistä tapahtumista (root-kirjautuminen, IAM-muutokset).',diff:'hard'},
{id:'m8t4',title:'Terraform infrastruktuuri koodina',desc:'Kirjoita Terraform-konfiguraatio joka luo: VPC, julkinen ja yksityinen aliverkko, security group, EC2-instanssi. Seuraa least privilege -periaatetta.',diff:'hard'},
{id:'m8t5',title:'Kubernetes tietoturva',desc:"Tutki K8s-haavoittuvuudet: privileged pods, host network, secrets base64, RBAC misconfiguration. Käytä kube-bench CIS-kovennustarkistukseen.",diff:'hard'},
{id:'m8t6',title:'Container escape',desc:"Tutki konttipakoilu: privileged container, host volume mount. Demonstroi turvallisessa lab-ympäristössä. Selitä mitigaatiot.",diff:'hard'},
{id:'m8t7',title:'Supply chain tietoturva',desc:"Tutki SolarWinds-hyökkäys. Miten CI/CD-pipeline kompromisoitiin? Mitä on SLSA? Miten suojautua?",diff:'medium'},
{id:'m8t8',title:'Honeytoken ja honeypot',desc:"Aseta honeytoken: fake API-avain tiedostoon, fake DB-rivi. Konfiguroi hälytys kun niihin kosketaan. Tutki OpenCanary.",diff:'hard'},
{id:'m8t9',title:'Network segmentointi suunnittelu',desc:"Suunnittele yritysverkon segmentointi: DMZ, sisäverkko, hallintaverkko, IoT-segmentti. Kirjoita palomuurisäännöt.",diff:'medium'},
{id:'m8t10',title:'Cloud SIEM',desc:"Konfiguroi AWS CloudWatch tai paikallinen ELK Stack. Kerää lokit SSH:sta, web-palvelimesta. Luo hälytyssäännöt.",diff:'hard'},
{id:'m8t11',title:'Terraform tietoturvatarkistus',desc:"Kirjoita Terraform-konfiguraatio EC2 + VPC:lle. Aja tfsec tai checkov löytääksesi ongelmat. Korjaa löydökset.",diff:'hard'},
{id:'m8t12',title:'Serverless tietoturva',desc:"Tutki AWS Lambda -haavoittuvuuksia: function event injection, over-privileged IAM, sensitive env vars.",diff:'hard'},
{id:'m8t13',title:'S3 bucket security audit',desc:'Tarkista S3-bucketien tietoturva-asetukset: julkinen pääsy, ACL, versiointi, salaus, logging, MFA delete. Kirjoita Python-skripti joka tarkistaa kaikki bucketit automaattisesti.',diff:'medium'},
{id:'m8t14',title:'CI/CD pipeline tietoturva',desc:'Lisää tietoturvatarkistukset GitHub Actions -pipelineen: SAST (bandit/semgrep), riippuvuusskannaus (pip-audit), secret scanning (gitleaks), Docker-image skannaus (trivy). Estä merge jos kriittisiä löydöksiä.',diff:'hard'},
{id:'m8t15',title:'Cloud Native Security maturity',desc:'Arvioi organisaation cloud security maturity CNCF Cloud Native Security -whitepaperin mukaan: Layer 1 (infrastructure), Layer 2 (workloads), Layer 3 (application). Laadi roadmap.',diff:'hard'}
],

{q:'Kuka vastaa datan turvallisuudesta pilvessä Shared Responsibility -mallissa?',opts:['Vain pilvipalveluntarjoaja','Vain asiakas','Molemmat eri osa-alueilla','Kolmas osapuoli'],ans:2,exp:'Shared Responsibility: pilvipalveluntarjoaja vastaa fyysisestä infrastruktuurista, asiakas vastaa datasta, käyttöoikeuksista ja sovelluksista.'}

{id:'m9',title:'Forensiikka ja Incident Response',subtitle:'Digitaalinen rikostutkinta, lokianalyysi, IR-prosessi',tag:'Pro',tagClass:'tag-red',
theory:[
{title:'Incident Response -prosessi',body:`<strong>IR-prosessi</strong> (NIST SP 800-61) koostuu neljästä vaiheesta:

<strong>1. Preparation:</strong> IR-suunnitelma, playbook:t, toolset, koulutus.

<strong>2. Detection & Analysis:</strong>
– Indikaattorit (IOC): IP-osoitteet, domain-nimet, hash-arvot
– SIEM: Lokit kerätään keskitetysti
– EDR: Päätelaitteiden reaaliaikainen valvonta

<strong>3. Containment, Eradication & Recovery:</strong>
– Eristä saastunut järjestelmä verkosta
– Säilytä todisteet ennen puhdistusta!
– Poista haittaohjelma ja backdoorit
– Paikka haavoittuvuus

<strong>4. Post-Incident Activity:</strong>
– Lessons learned -palaveri
– Raportoi (GDPR vaatii 72h ilmoitus)
– Päivitä suunnitelmat`},
{title:'Digitaalinen forensiikka',body:`<strong>Order of Volatility</strong> – kerää data pysyvyyden mukaan:
1. CPU-rekisterit (katoaa välittömästi)
2. RAM-muisti (katoaa virran katketessa)
3. Verkkoliikenne
4. Prosessit ja avoimet tiedostot
5. Kiintolevyn sisältö

<strong>Forensiikkatyökalut:</strong>
dd: levykuvat
Autopsy/Sleuth Kit: levyanalyysit
Volatility: muistianalyysi
Wireshark: verkkoforensikka
FTK Imager: todisteiden keruu

<strong>Chain of Custody:</strong>
Kaikki toimenpiteet dokumentoitava. Todisteet eivät saa kontaminoitua. Kirjauslokissa: kuka, milloin, mitä teki.`}
],
tasks:[
{id:'m9t1',title:'Muistiforensikka Volatility3:lla',desc:'Lataa harjoitusmuistidumppi (esim. MemLabs tai BlueTeamLabs). Analysoi Volatility3:lla: pslist (prosessit), netscan (verkkoyhteydet), cmdline (komennot), filescan (avoimet tiedostot), dumpfiles (vie tiedostot).',diff:'medium',
solution:`# Volatility3 peruskomennot
# pip install volatility3

# Käynnissä olevat prosessit
vol -f memory.dmp windows.pslist.PsList

# Prosessipuu
vol -f memory.dmp windows.pstree.PsTree

# Verkkoyhteydex
vol -f memory.dmp windows.netscan.NetScan

# Komentohistoria
vol -f memory.dmp windows.cmdline.CmdLine

# Tiedostot
vol -f memory.dmp windows.filescan.FileScan | grep -i "\.exe\|\.dll\|\.ps1"

# Hae tiedosto muistista
vol -f memory.dmp windows.dumpfiles.DumpFiles --virtaddr 0xHEX_OSOITE

# Haittaohjelman indikaattorit
vol -f memory.dmp windows.malfind.Malfind  # VAD-anomaliat
vol -f memory.dmp windows.dlllist.DllList --pid 1234  # DLL-lista prosessille`},
{id:'m9t2',title:'Levyforensikka Autopsy:lla',desc:'Luo testiskenaarion: kopioi tiedostoja, poista ne, aja Autopsy/Sleuth Kit. Palauta poistetut tiedostot (file carving). Tutki: aikaleiman muuttaminen (timestomping), piilotiedostot, vaihtoehtoinen datastream (ADS).',diff:'hard'},
{id:'m9t3',title:'Log Analysis: hyökkäyksen rekonstruointi',desc:'Lataa harjoitusloki (esim. SANS Log Challenges). Rekonstruoi hyökkäys: milloin alkoi, mitä tehtiin, mitä dataa käytettiin. Kirjoita Python-skripti lokianalysointiin: filter, grep, correlate, timeline.',diff:'hard'},
{id:'m9t4',title:'Incident Response playbook',desc:'Kirjoita IR-playbook seuraavalle skenaariolle: ransomware-hyökkäys. Sisältä: havaitseminen, eristäminen, analysointi, puhdistus, palautus, viestintä (GDPR 72h). Käytä NIST 800-61 -rakennetta.',diff:'medium'},
{id:'m9t5',title:'PCAP-forennsiikka',desc:'Analysoi PCAP-tiedosto (esim. Malware Traffic Analysis tai CTF). Tunnista: C2-liikenne (beacon patterns), data exfiltration (suuri data ulospäin), port scanning, credential theft (HTTP plaintext).',diff:'hard'},
{id:'m9t6',title:'Timeline-analyysi',desc:'Rakenna aikajanataulukko tietoturvapoikkeamasta: yhdistä lokit useasta lähteestä (web server, auth, syslog, firewall). Käytä log2timeline/plaso tai oma Python-skripti. Korreloi tapahtumat.',diff:'hard'},
{id:'m9t7',title:'Haittaohjelma-analyysi: static',desc:'Staattinen haittaohjelma-analyysi (turvallinen ympäristö tai harjoitusnäyte): strings, file, xxd (magic bytes), PEiD (pakkaus), imports (DLL-kutsut). Etsi IOC:ita: IP-osoitteet, domain-nimet, registry keys.',diff:'hard'},
{id:'m9t8',title:'Network forensics',desc:'Verkkoforensikka: Analysoi pcap Wiresharkilla tai tshark:lla: 1) Suurimmat siirtäjät, 2) DNS-kyselyt DGA-kuvioille (satunnaiset domainit), 3) HTTP user-agentit, 4) TLS sertifikaatit (self-signed?).',diff:'medium'},
{id:'m9t9',title:'IOC-tietokanta',desc:'Rakenna IOC-tietokanta (Indicators of Compromise): luo SQLite-tietokanta hash-arvoille, IP-osoitteille, domaineille. Integroi MISP tai VirusTotal API -kyselyt. Automaattiset lokkitarkistukset.',diff:'hard'},
{id:'m9t10',title:'Digital Evidence raportoi',desc:'Kirjoita forensiikkaraportti löydetyistä todisteista: executive summary, tekninen osio, todisteiden luettelo (hash-arvot), aikajanaa, johtopäätökset, suositukset. Oikeuskelpoinen muoto.',diff:'medium'},
{id:'m9t11',title:'Anti-forensics tekniikat',desc:'Tutki anti-forensics-tekniikat (vain ymmärtämiseen): timestomping (muuta aikaleimoja), log wiper, steganografia, salattu viestintä. Miten forensiikkatutkija havaitsee näitä?',diff:'hard'},
{id:'m9t12',title:'Haittaohjelmatyypit',desc:'Tutki eri haittaohjelmatyyppejä: virus, worm, trojan, ransomware, spyware, adware, rootkit, botnet. Analysoi yksi julkinen näyte (ANY.RUN sandbox). Tunnista TTPs MITRE ATT&CK -kehyksessä.',diff:'medium'},
{id:'m9t13',title:'SIEM-säännöt Elasticilla',desc:'Asenna Elasticsearch + Kibana (ELK Stack) tai käytä Elastic Cloud (free trial). Tuo lokeja. Luo detection rules: brute force, privilege escalation, lateral movement. Testaa alerts.',diff:'hard'},
{id:'m9t14',title:'Threat Hunting',desc:'Threat hunting -harjoitus: oleta että verkossa on jo hyökkääjä. Etsi IOC:ita proaktiivisesti lokidata:sta: epäilyttävät prosessit, outot verkkoyhteydet, poikkeavat kirjautumisajat. Dokumentoi hypoteesi → analyysi → löydöt.',diff:'hard'},
{id:'m9t15',title:'CTF Forensics haaste',desc:'Ratkaise 3 forensiikka-haastetta CTF-alustoilta (PicoCTF, HackTheBox, CyberDefenders). Dokumentoi: haaste, lähestymistapa, työkalut, ratkaisu. Mikä oli vaikein ja miksi?',diff:'hard'}
],
quiz:[
{q:'Mikä on "Order of Volatility" forensiikassa?',opts:['Haittaohjelman aggressiivisuus','Järjestys jossa data kerätään häviävyytensä mukaan','Verkon liikenteen nopeus','Salauksen purkuaika'],ans:1,exp:'Order of Volatility määrää todisteiden keräysjärjestyksen: ensin häilyvin data (RAM, verkkoliikenne) ja viimeiseksi pysyvä data (kiintolevy). RAM katoaa virran katketessa, joten se kerätään ensin.'},
{q:'Miksi GDPR vaatii ilmoittamaan tietomurrosta 72 tunnissa?',opts:['Jotta kilpailijat tietävät','Jotta tietosuojaviranomainen voi reagoida ajoissa','Jotta media saa uutisoida','Jotta asiakkaat voivat vaihtaa salasanat'],ans:1,exp:'GDPR 33. artikla vaatii ilmoittamaan henkilötietoihin kohdistuvasta tietomurrosta valvontaviranomaiselle 72 tunnissa. Tämä mahdollistaa nopeat suojelutoimenpiteet rekisteröityjen suojaksi.'}
]},

{id:'m10',title:'Penetraatiotestaus',subtitle:'Recon, exploitaatio, post-exploitation, raportointi',tag:'Pro',tagClass:'tag-red',
theory:[
{title:'Penetraatiotestauksen metodologia',body:`Penetraatiotestaus (pentest) on luvallinen, kontrolloitu hyökkäys organisaation järjestelmiin tietoturvaheikkouksien löytämiseksi.

<strong>Vaiheet (PTES-metodologia):</strong>
1. Pre-engagement: sopimus, laajuus, säännöt (ROE)
2. Intelligence Gathering: OSINT, recon
3. Threat Modeling: mitkä hyökkäykset ovat relevantteja?
4. Vulnerability Analysis: haavoittuvuuksien tunnistaminen
5. Exploitation: haavoittuvuuden hyödyntäminen
6. Post-exploitation: mitä voidaan tehdä pääsyn jälkeen?
7. Reporting: kirjallinen raportti

<strong>Työtyypit:</strong>
Black box: ei taustatietoa (hyökkääjän näkökulma)
Grey box: osittainen tieto (esim. käyttäjätunnus)
White box: täysi pääsy (koodikatselmointi)

<strong>Metasploit Framework:</strong>
use exploit/windows/smb/ms17_010_eternalblue
set RHOSTS 192.168.1.100
run → shell → meterpreter`},
{title:'CVE ja haavoittuvuushallinta',body:`<strong>CVE (Common Vulnerabilities and Exposures):</strong>
CVE-2017-0144 = EternalBlue (WannaCry)
CVE-2021-44228 = Log4Shell
CVE-2014-0160 = Heartbleed

<strong>CVSS (Common Vulnerability Scoring System):</strong>
0.0-3.9: Matala
4.0-6.9: Keski
7.0-8.9: Korkea
9.0-10.0: Kriittinen

<strong>NVD (National Vulnerability Database):</strong>
nvd.nist.gov – kattava haavoittuvuustietokanta`}
],
tasks:[
{id:'m10t1',title:'Metasploit-perusteet',desc:'Asenna Metasploit (Kali Linux sisältää sen). Harjoittele omassa lab-ympäristössä (Metasploitable VM): 1) msfconsole, 2) search exploit, 3) use, set, run, 4) meterpreter perusteet, 5) post-exploitation (hashdump, sysinfo).',diff:'hard'},
{id:'m10t2',title:'Recon-vaiheen automatisointi',desc:'Kirjoita Python-skripti joka automatisoi recon-vaiheen: 1) WHOIS-kysely, 2) DNS-enumerointi (alidomainit), 3) Port scan (python-nmap), 4) Banner grabbing, 5) Shodan API -kysely. Tulosta strukturoitu raportti.',diff:'hard',
solution:`import subprocess, socket, whois, json
import nmap  # python-nmap
import shodan  # pip install shodan

def recon(kohde, shodan_api_key=None):
    tulokset = {"kohde": kohde}
    
    # WHOIS
    try:
        w = whois.whois(kohde)
        tulokset["whois"] = {
            "rekisteröijä": str(w.registrar),
            "luotu": str(w.creation_date),
            "vanhenee": str(w.expiration_date),
        }
    except Exception as e:
        tulokset["whois"] = f"Virhe: {e}"
    
    # IP-osoite
    try:
        ip = socket.gethostbyname(kohde)
        tulokset["ip"] = ip
    except:
        ip = kohde
    
    # Nmap-skannaus
    nm = nmap.PortScanner()
    nm.scan(ip, '1-1024', arguments='-sV -sC --open')
    tulokset["portit"] = {}
    for host in nm.all_hosts():
        for proto in nm[host].all_protocols():
            for portti in nm[host][proto].keys():
                info = nm[host][proto][portti]
                if info['state'] == 'open':
                    tulokset["portit"][portti] = {
                        "palvelu": info.get("name"),
                        "versio": info.get("version"),
                    }
    
    # Shodan (vaatii API-avaimen)
    if shodan_api_key:
        try:
            api = shodan.Shodan(shodan_api_key)
            info = api.host(ip)
            tulokset["shodan"] = {
                "org": info.get("org"),
                "os": info.get("os"),
                "cve": [v['cvss'] for v in info.get('vulns', {}).values() if 'cvss' in v]
            }
        except:
            pass
    
    return tulokset

# VAIN OMILLE KOHTEILLE TAI LUVALLA!
# tulos = recon("example.com")
# print(json.dumps(tulos, indent=2))`},
{id:'m10t3',title:'Haavoittuvuuksien löytäminen',desc:'Käytä Nikto (web-haavoittuvuusskanneri) ja OpenVAS DVWA:han tai Metasploitable:een (omassa lab:issa). Analysoi tulokset, luokittele vakavuuden mukaan (CVSS), priorisoi. Selitä jokainen löydös.',diff:'hard'},
{id:'m10t4',title:'Buffer Overflow -teoria',desc:'Buffer overflow -perusteet: 1) Miten pino toimii (stack frame, return address), 2) Yksinkertainen C-ohjelma jolla BOF (intentionally vulnerable), 3) Ylikirjoita return address, 4) Mitä on ASLR, DEP/NX, Stack Canary?',diff:'hard'},
{id:'m10t5',title:'Penetraatiotestausraportti',desc:'Kirjoita ammattimainen penetraatiotestausraportti (kuvitteellisesta tai HackTheBox/TryHackMe -koneesta): Executive Summary, Technical Findings (CVSS, POC, remediation), Appendix. Käytä oikeaa raporttimallia.',diff:'medium'},
{id:'m10t6',title:'OWASP WebGoat',desc:'Asenna OWASP WebGoat (Docker: docker run webgoat/webgoat). Ratkaise 10 haastetta: SQL Injection, XSS, CSRF, Insecure Direct Object References, Missing Access Control. Dokumentoi jokainen.',diff:'hard'},
{id:'m10t7',title:'HackTheBox Easy-kone',desc:'Ratkaise HackTheBox Easy-tason kone (esim. Lame, Legacy, Blue tai Jerry). Dokumentoi: recon, haavoittuvuuden löytäminen, exploitaatio, privilege escalation, root flag. Kirjoita writeup.',diff:'hard'},
{id:'m10t8',title:'Password Cracking',desc:'Salasanojen murtaminen (omilla hasheilla!): 1) John the Ripper wordlist-hyökkäys, 2) Hashcat GPU-kiihdytys, 3) Rainbow table vs. salted hash, 4) Luo oma wordlist (CeWL verkkosivulta), 5) Säännöt (rules).',diff:'hard'},
{id:'m10t9',title:'Active Directory basics',desc:'Active Directory tietoturva: 1) AD-rakenne (DC, OU, GPO), 2) Kerberos-autentikointi, 3) BloodHound (polut domain adminiksi), 4) Tyypilliset hyökkäykset (Pass-the-Hash, Kerberoasting), 5) Mitigaatiot.',diff:'hard'},
{id:'m10t10',title:'Wireless pentesting',desc:'WiFi-turvallisuustestaus (omalle verkolle!): 1) Airmon-ng monitorointitilaan, 2) Airodump-ng skannaa, 3) WPA2 handshake -sieppaus, 4) Hashcat/aircrack-ng murtaminen, 5) WPA3 - miksi turvallisempi.',diff:'hard'},
{id:'m10t11',title:'Pivoting ja tunneling',desc:'Verkossa liikkuminen: 1) SSH tunneling (local, remote, dynamic), 2) Proxychains, 3) Chisel tunneling, 4) Meterpreter pivot. Simuloi: pääsy A:sta B:hen C:n kautta.',diff:'hard'},
{id:'m10t12',title:'Evasion tekniikat',desc:'Virustorjunnan kiertäminen (eettisessä kontekstissa): 1) Obfuskaatio, 2) Encoding (base64, XOR), 3) Process injection -teoria, 4) Miten AV tunnistaa haittaohjelmia (signatuurit vs. heuristiikka vs. sandbox).',diff:'hard'},
{id:'m10t13',title:'MITRE ATT&CK Framework',desc:'MITRE ATT&CK käytännössä: 1) Taktiikat ja tekniikat (Initial Access, Execution, Persistence...), 2) Mappaa jokin hyökkäys ATT&CK:iin, 3) Luo detection rules yhdelle tekniikalle, 4) Threat intelligence raportti.',diff:'medium'},
{id:'m10t14',title:'Bug Bounty tutkimus',desc:'Bug bounty -ohjelmat: 1) Miten löytää sopiva ohjelma (HackerOne, Bugcrowd), 2) Lue scope ja säännöt huolellisesti, 3) Harjoittele: OWASP Juice Shop tai HackTheBox, 4) Kirjoita proof-of-concept raportti.',diff:'medium'},
{id:'m10t15',title:'Red vs Blue team harjoitus',desc:'Red vs Blue -harjoitus parin kanssa (tai yksin eri VM:illä): Red team hyökkää (Kali), Blue team puolustaa (Ubuntu + Splunk/ELK). Dokumentoi molemmat näkökulmat. Lessons learned -palaveri.',diff:'hard'}
],

{q:'Mikä on "Black box" penetraatiotestaus?',opts:['Testaus pimeässä','Testaus ilman taustatietoa kohteesta','Testaus täyden tiedon kanssa','Testaus vain sovellukselle'],ans:1,exp:'Black box -testauksessa testerillä ei ole etukäteistietoa kohteesta (kuten hyökkääjällä). Grey box on osittainen tieto, white box on täysi pääsy koodiin ja dokumentaatioon.'},
{q:'Mitä CVE-numero tarkoittaa?',opts:['Common Vulnerability Exploit','Common Vulnerabilities and Exposures','Computer Virus Encyclopedia','Certified Vulnerability Expert'],ans:1,exp:'CVE (Common Vulnerabilities and Exposures) on standardoitu numerointijärjestelmä tietoturvahaavoittuvuuksille. Esim. CVE-2021-44228 on Log4Shell.'}
]},

{id:'m11',title:'Tietosuoja ja vaatimustenmukaisuus',subtitle:'GDPR, ISO 27001, NIS2, tietoturvapolitiikka',tag:'Pro',tagClass:'tag-red',
theory:[
{title:'GDPR - Yleinen tietosuoja-asetus',body:`GDPR (General Data Protection Regulation) tuli voimaan 2018. Se koskee kaikkia organisaatioita jotka käsittelevät EU-kansalaisten henkilötietoja.

<strong>Avainperiaatteet:</strong>
Lainmukaisuus, kohtuullisuus, läpinäkyvyys
Käyttötarkoitussidonnaisuus (vain ilmoitettuun tarkoitukseen)
Tietojen minimointi (vain tarvittavat tiedot)
Täsmällisyys (tiedot ajan tasalla)
Säilytyksen rajoittaminen (vain tarvittava aika)
Eheys ja luottamuksellisuus
Rekisterinpitäjän vastuu

<strong>Rekisteröityjen oikeudet:</strong>
Oikeus saada tietoa
Oikeus tutustua tietoihin
Oikeus oikaista tietoja
Oikeus tulla unohdetuksi
Oikeus siirtää tietoja (portabiliteetti)
Oikeus vastustaa käsittelyä

<strong>Sanktiot:</strong>
Jopa 4% maailmanlaajuisesta vuosiliikevaihdosta tai 20 miljoonaa euroa`},
{title:'ISO 27001 ja tietoturvahallintajärjestelmä',body:`ISO 27001 on kansainvälinen standardi tietoturvallisuuden hallintajärjestelmälle (ISMS).

<strong>Rakenne:</strong>
Annex A: 93 tietoturvakontrollia
14 hallinta-aluetta: tietoturvapolitiikka, organisaatio, HR, fyysinen turvallisuus, pääsynhallinta, kryptografia, toimitusketju, jne.

<strong>PDCA-sykli:</strong>
Plan: tunnista riskit, suunnittele kontrollit
Do: implementoi kontrollit
Check: auditoi ja mittaa
Act: paranna jatkuvasti

<strong>NIS2 (2024):</strong>
EU:n verkko- ja tietoturvadirektiivi. Koskee kriittisiä sektoreita (energia, terveys, liikenne, digitaalipalvelut). Vaatii: riskienhallinta, raportointivelvollisuus 24h, hallituksen vastuu.`}
],
tasks:[
{id:'m11t1',title:'GDPR-vaatimusten kartoitus',desc:'Analysoi kuvitteellisen verkkokaupan GDPR-vaatimustenmukaisuus: 1) Mitä henkilötietoja kerätään?, 2) Oikeusperusta käsittelylle, 3) Evästelupa, 4) Tietosuojaseloste, 5) Tietomurtoprosessi. Laadi gap-analyysi.',diff:'medium'},
{id:'m11t2',title:'Tietosuojaseloste',desc:'Kirjoita kattava tietosuojaseloste (privacy policy) GDPR:n mukaisesti: rekisterinpitäjä, yhteyshenkilö, käsittelytarkoitukset, oikeusperusta, kolmannet osapuolet, säilytysajat, rekisteröityjen oikeudet.',diff:'medium'},
{id:'m11t3',title:'Riskianalyysi ISO 27001',desc:'Tee tietoturvariskianalyysi: tunnista 10 uhkaa, arvioi todennäköisyys ja vaikutus (1-5), laske riskipisteet, priorisoi käsittely, ehdota kontrollit. Käytä ISO 27005 -metodologiaa.',diff:'hard'},
{id:'m11t4',title:'Tietoturvapolitiikka',desc:'Kirjoita yrityksen tietoturvapolitiikka: johtajiston sitoutuminen, vastuut, hyväksyttävä käyttö, salasanapolitiikka, etätyö, BYOD, tiedonsäilytys ja -tuhoaminen. Max 2 sivua, käytännönläheinen.',diff:'medium'},
{id:'m11t5',title:'Business Continuity Plan',desc:'Liiketoiminnan jatkuvuussuunnitelma (BCP): 1) Kriittiset prosessit, 2) RPO/RTO (Recovery Point/Time Objectives), 3) Varahenkilöt, 4) Tiedottaminen, 5) Harjoitukset. Katastrofiskenaariot: tulipalo, ransomware, avainhenkilö poissa.',diff:'hard'},
{id:'m11t6',title:'Tietoturva-auditointi',desc:'Suorita tietoturva-auditointi kuvitteelliselle organisaatiolle ISO 27001 Annex A:n mukaisesti. Tarkista: kulunvalvonta, pääsynhallinta, kryptografia, fyysinen turvallisuus, henkilöstö. Laadi auditointiraportti.',diff:'hard'},
{id:'m11t7',title:'DPIA - Tietosuojan vaikutustenarviointi',desc:'Tee DPIA (Data Protection Impact Assessment) uudelle järjestelmälle joka käsittelee arkaluonteisia tietoja (esim. terveystiedot). Tunnista riskit, arvioi tarvittavuus, määritä suojaustoimenpiteet.',diff:'hard'},
{id:'m11t8',title:'Toimittajien tietoturva-arviointi',desc:'Luo toimittajien tietoturva-arviointiprosessi (vendor risk management): kysymyslomake (30 kysymystä), pisteytysjärjestelmä, hyväksymiskriteerit, sopimukselliset vaatimukset (DPA), jatkuva seuranta.',diff:'hard'},
{id:'m11t9',title:'NIS2-vaatimustenmukaisuus',desc:'NIS2-direktiivin vaatimukset: tunnista soveltuuko se organisaatioosi, kartoita puutteet, laadi toteutussuunnitelma. Alueet: riskienhallinta, toimitusketju, häiriöilmoitukset, hallituksen vastuu.',diff:'hard'},
{id:'m11t10',title:'Tietoturvallisuuden KPI:t',desc:'Määritä tietoturvallisuuden mittarit (KPI ja KRI): patch rate, MTTD/MTTR, phishing click-rate, vulnerability backlog, training completion. Luo dashboard. Miten raportoidaan johtoryhmälle?',diff:'medium'},
{id:'m11t11',title:'Incident Management prosessi',desc:'Tietoturvapoikkeaman hallintaprosessi: ilmoitusvaihe, luokittelu (P1-P4), rooleihin (IR Lead, Tech Lead, Comms), eskalointiketju, ulkoinen kommunikaatio, viranomaisilmoitukset. Tee prosessikaavio.',diff:'medium'},
{id:'m11t12',title:'Phishing-simulaatio kampanja',desc:'Suunnittele phishing-simulaatiokampanja organisaatiolle (vain luvalla!): tavoitteet, metodologia, viestintä etukäteen, kampanja, tulosten analyysi (click rate, raportointi), koulutus.',diff:'hard'},
{id:'m11t13',title:'Tietoturvastrategia 3 vuodelle',desc:'Laadi 3 vuoden tietoturvastrategia: nykytila-analyysi (maturity model), tavoitetila, strategiset projektit, budjetti-arvio, organisaatio, riskitoleranssi. Presentaatio johtoryhmälle.',diff:'hard'},
{id:'m11t14',title:'Tietoturvalaki Suomessa',desc:'Suomen tietoturvallisuuslainsäädäntö: Tietosuojalaki (2018), Kyberturvallisuuslaki (NIS2 implementaatio), GDPR. Lisäksi sektorikohtaiset: FinFSA (rahoitus), Valvira (terveys). Laadi yhteenveto.',diff:'medium'},
{id:'m11t15',title:'Security Champions -ohjelma',desc:'Suunnittele Security Champions -ohjelma organisaatiolle: rekrytointi, koulutuspolku, vastuut, resurssit, kannustimet, mittarit. Miten security saadaan osaksi jokaista tiimiä (DevSecOps)?',diff:'hard'}
],

{q:'Kuinka kauan yrityksellä on aikaa ilmoittaa tietomurrosta GDPR:n mukaan?',opts:['24 tuntia','48 tuntia','72 tuntia','1 viikko'],ans:2,exp:'GDPR artikla 33: tietomurrosta on ilmoitettava valvontaviranomaiselle 72 tunnin kuluessa sen havaitsemisesta. Myöhästymiselle on oltava perusteltu syy.'},
{q:'Mitä ISO 27001 -sertifiointi osoittaa?',opts:['Yritys on hakkeroitu','Tietoturvallisuuden hallintajärjestelmä on auditoitu ja täyttää vaatimukset','Yritys käyttää parasta salausteknologiaa','Yritys noudattaa GDPR:ää'],ans:1,exp:'ISO 27001 -sertifiointi osoittaa että organisaation tietoturvallisuuden hallintajärjestelmä (ISMS) on riippumattomasti auditoitu ja täyttää standardin vaatimukset.'}
]},

{id:'m12',title:'CTF ja Kilpailutehtävät',subtitle:'HackTheBox, TryHackMe, PicoCTF, kilpailustrategia',tag:'Pro',tagClass:'tag-red',
theory:[
{title:'CTF-kilpailujen kategoriat',body:`CTF (Capture The Flag) on tietoturvakilpailu jossa ratkaistaan haasteita eri kategorioissa.

<strong>Kategoriat:</strong>
Web: SQL-injektio, XSS, SSRF, autentikaatioohitus
Crypto: salausten murtaminen, protokollaheikkoudet
Reversing: käänteissuunnittelu (reverse engineering)
Pwn: binäärikoodin exploitaatio (buffer overflow)
Forensics: muisti, levykuvat, verkkoliikenne, steganografia
Misc: ohjelmointi, trivia, OSINT

<strong>Strategia:</strong>
1. Lue tehtävänanto huolellisesti
2. Tunnista kategoria ja tutut kuviot
3. Aloita helpommista saadaksesi pisteitä
4. Tee muistiinpanoja (mitä kokeilit)
5. Yhteistyö tiimissä`},
{title:'Hyödyllisiä CTF-työkaluja',body:`<strong>Kryptografia:</strong>
CyberChef (selainpohjainen muunnotyökalu)
dcode.fr (historialliset salaukset)
RsaCtfTool, factordb.com

<strong>Forensics:</strong>
binwalk (tiedostojen poiminta)
steghide, zsteg, stegsolve (steganografia)
foremost, photorec (file carving)
volatility (muistiforensikka)

<strong>Web:</strong>
Burp Suite, OWASP ZAP
sqlmap (SQL-injektio automatisointi)
ffuf, gobuster (hakemistosysteemat)
nikto (web-skanneri)

<strong>Reversing:</strong>
Ghidra (NSA:n ilmainen disassembler)
IDA Free, Binary Ninja
pwndbg (GDB-laajennus)
strings, ltrace, strace`}
],
tasks:[
{id:'m12t1',title:'PicoCTF aloitushaasteet',desc:'Rekisteröidy picoctf.org. Ratkaise 10 haastetta kategoriasta: General Skills, Web Exploitation, Cryptography, Forensics. Dokumentoi jokainen: haaste, lähestymistapa, opittu asia.',diff:'easy'},
{id:'m12t2',title:'TryHackMe oppimispolku',desc:'Rekisteröidy tryhackme.com (ilmainen). Suorita: 1) Introduction to Cybersecurity -oppimispolku, 2) Linux Fundamentals -huoneet, 3) Network Fundamentals. Dokumentoi edistyminen.',diff:'easy'},
{id:'m12t3',title:'CyberChef-harjoitukset',desc:'CyberChef (gchq.github.io/CyberChef): 1) Base64 enkoodaus/dekoodaus, 2) Hex-muunnokset, 3) ROT13, 4) AES-salaus/purku, 5) Zlib-pakkaus, 6) JWT decode, 7) Löydä piilotettu lippu monivaiheisellla reseptillä.',diff:'easy'},
{id:'m12t4',title:'Kryptografia CTF-haasteet',desc:'Ratkaise 5 kryptografiahaastetta: 1) Caesar cipher, 2) Vigenere cipher, 3) RSA pieni julkinen eksponentti (e=3), 4) XOR avain tunnetusta selväkieliestä, 5) Frequency analysis.',diff:'medium',
solution:`# CTF Kryptografia ratkaisut

# 1. Caesar cipher brute force
def caesar_brute(ciphertext):
    for shift in range(26):
        decoded = ""
        for c in ciphertext:
            if c.isalpha():
                base = ord('A') if c.isupper() else ord('a')
                decoded += chr((ord(c) - base - shift) % 26 + base)
            else:
                decoded += c
        print(f"Shift {shift:2}: {decoded[:40]}")

# 2. XOR avain tunnetusta selväkielestä (known plaintext)
def xor_key(ciphertext_hex, known_plaintext):
    ct = bytes.fromhex(ciphertext_hex)
    kp = known_plaintext.encode()
    key = bytes(a ^ b for a, b in zip(ct, kp))
    return key

# 3. Frequency analysis
from collections import Counter
def frequency_analysis(ciphertext):
    kirjaimet = [c.lower() for c in ciphertext if c.isalpha()]
    freq = Counter(kirjaimet)
    print("Yleisimmät kirjaimet:")
    for k, v in freq.most_common(5):
        print(f"  {k}: {v} ({v/len(kirjaimet)*100:.1f}%)")
    print("(englanniksi: e, t, a, o, i, n)")

# Testaa
caesar_brute("Khoor Zruog")  # Hello World shift 3`},
{id:'m12t5',title:'Steganografia CTF',desc:'Steganografia-haasteet: 1) Piilotettu teksti kuvassa (steghide/zsteg), 2) LSB-piilotettu data, 3) Metatiedoissa piilotettu lippu (exiftool), 4) Binwalk-purku (tiedosto tiedostossa), 5. Audio steganografia (Audacity/Sonic Visualizer).',diff:'medium'},
{id:'m12t6',title:'Web CTF haasteet',desc:'Ratkaise 5 web-haastetta (HackTheBox Starting Point tai PicoCTF Web): robots.txt, source code review, cookie manipulation, local file inclusion, simple SQL injection. Dokumentoi jokainen.',diff:'medium'},
{id:'m12t7',title:'Forensics PCAP-analyysi CTF',desc:'Lataa CTF PCAP-tiedosto (netresec.com tai PacketTotal.com on harjoitusnäytteitä). Analysoi Wiresharkilla: HTTP-liikenne, DNS-kyselyt, FTP (selväkielinen salasana?), IRC tai epäilyttävä protokolla. Löydä lippu.',diff:'hard'},
{id:'m12t8',title:'HackTheBox Starting Point',desc:'HackTheBox Starting Point -koneet (ilmainen): ratkaise vähintään 3 konetta (Meow, Fawn, Dancing). Dokumentoi: recon, exploitaatio, root flag. Kirjoita writeup.',diff:'hard'},
{id:'m12t9',title:'Reversing-perusteet',desc:'Binäärin käänteissuunnittelu: 1) strings-komento (etsii selväkielisiä merkkijonoja), 2) file-komento (tunnistaa binäärityyppi), 3) ltrace/strace (kirjastokutsut), 4) Ghidra: decompile yksinkertainen C-ohjelma. Löydä piilotettu salasana.',diff:'hard'},
{id:'m12t10',title:'CTF-tiimi ja kirjanpito',desc:'Perusta CTF-tiimi tai osallistu CTFtime.org:n kautta. Osallistu yhteen CTF-kilpailuun. Pidä kirjaa: ratkaisut (writeups), opitut tekniikat, epäonnistuneet yritykset. Jaa tieto tiimin kesken.',diff:'medium'},
{id:'m12t11',title:'Pwn: Buffer overflow perusteet',desc:'Buffer overflow CTF (vain harjoitusbinäärit!): 1) Identifioi BOF (segfault), 2) Laske offset (cyclic/pattern), 3) Ylikirjoita EIP/RIP, 4) NOP sled + shellcode (jos ei suojauksia), 5. ret2libc (ASLR:n kanssa).',diff:'hard'},
{id:'m12t12',title:'OSINT CTF-haaste',desc:'OSINT-haasteet: 1) Löydä henkilö annetun sähköpostiosoitteen perusteella (HIBP, haveibeenpwned), 2) Tunnista paikka kuvasta, 3) Löydä yrityksen tietoja (LinkedIn, WHOIS), 4) Reverse image search.',diff:'medium'},
{id:'m12t13',title:'Scriptiä CTF:ään',desc:'Kirjoita Python-skriptejä CTF-automaatioon: 1) Brute force web login (requests), 2) Base64 + ROT13 + XOR -yhdistelmäpurku, 3) RSA small e attack (gmpy2), 4) LFI path fuzz, 5. SQL-injektio data extraction.',diff:'hard'},
{id:'m12t14',title:'CTF writeup julkaisu',desc:'Kirjoita laadukas CTF writeup ratkaisemastasi haasteesta ja julkaise se: 1) GitHub tai blog, 2) CTFtime writeup-osio, 3) Sisällytä: haaste, lähestymistapa, koodi, lippu, opittu. Ota yhteisöltä palautetta.',diff:'medium'},
{id:'m12t15',title:'Oma CTF-haaste',desc:'Luo oma CTF-haaste jollekin aiheelle (web, crypto, forensics): 1) Suunnittele haaste, 2) Toteuta (Flask tai staattinen tiedosto), 3) Testaa (onko ratkaistava?), 4. Kirjoita ratkaisu-guide. Jaa muiden testattavaksi.',diff:'hard'}
],

{q:'Mikä työkalu sopii parhaiten kryptografisten muunnosten ketjuttamiseen CTF:ssä?',opts:['Wireshark','CyberChef','Nmap','Burp Suite'],ans:1,exp:'CyberChef (GCHQ:n kehittämä) on selainpohjainen työkalu joka mahdollistaa satojen operaatioiden ketjuttamisen: Base64, XOR, AES, hex, zip, regex, jne.'},
{q:'Mitä "flag" tarkoittaa CTF-kilpailussa?',opts:['Maan lippu','Salainen merkkijono joka todistaa haasteen ratkaisun','Virheviesti','Verkkolippu'],ans:1,exp:'CTF-lippu on salainen merkkijono (esim. picoCTF{s3cr3t_fl4g}) joka saadaan ratkaisemalla haaste. Se syötetään kilpailualustalle pisteiden saamiseksi.'}
]},

{id:'m13',title:'DevSecOps ja tietoturva-automaatio',subtitle:'CI/CD tietoturva, SAST/DAST, container security',tag:'Pro',tagClass:'tag-red',
theory:[
{title:'DevSecOps-periaatteet',body:`DevSecOps integroi tietoturvan ohjelmistokehitysprosessiin "shift left" -periaatteella – tietoturva huomioidaan alusta asti.

<strong>"Shift Left" -periaate:</strong>
Löydä haavoittuvuudet kehityksessä, ei tuotannossa.
Kehittäjä: 1h korjata | QA: 10h | Tuotanto: 100h+

<strong>DevSecOps-pipelineVaiheet:</strong>
Pre-commit: secret scanning, linting
Build: SAST, dependency check
Test: DAST, integration tests
Deploy: container scanning, IaC scanning
Runtime: WAF, RASP, anomalia detection

<strong>Security Gates:</strong>
Critical CVSS 9+ → STOP, korjattava ennen mergeä
High CVSS 7+ → varaus ticketiin, 30 päivää
Medium → backlog
Low → hyväksytty riski`},
{title:'Tietoturvatyökalut CI/CD:ssä',body:`<strong>SAST-työkalut:</strong>
Semgrep: multi-language, custom rules
SonarQube: koodin laatu + tietoturva
Bandit: Python-spesifinen
ESLint security plugins: JavaScript

<strong>SCA (Software Composition Analysis):</strong>
Snyk: riippuvuuksien haavoittuvuudet
OWASP Dependency Check
npm audit, pip-audit

<strong>DAST:</strong>
OWASP ZAP: automaattinen web-skannaus
Burp Suite Enterprise
Nuclei: template-pohjainen skannaus

<strong>Container & IaC:</strong>
Trivy: kontit + IaC + Git
Checkov: Terraform/CloudFormation
Hadolint: Dockerfile linting
Falco: runtime container monitoring`}
],
tasks:[
{id:'m13t1',title:'GitHub Actions tietoturva-pipeline',desc:'Lisää tietoturvatarkistukset GitHub Actions -pipelineen: 1) Semgrep SAST, 2) pip-audit riippuvuudet, 3) Gitleaks secret scanning, 4) Trivy container scan, 5) OWASP ZAP DAST. Estä merge kriittisistä.',diff:'hard',
solution:`# .github/workflows/security.yml
name: Security Pipeline

on: [push, pull_request]

jobs:
  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Semgrep SAST
      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/security-audit
            p/owasp-top-ten
      
      # pip-audit
      - name: Pip Audit
        run: |
          pip install pip-audit
          pip-audit --format json --output pip-audit-report.json
          # Epäonnistu jos kriittisiä löytyy
          pip-audit --fail-on-cvss 9.0
      
      # Gitleaks secret scanning
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: \${{ secrets.GITHUB_TOKEN }}

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t myapp:test .
      
      # Trivy container scan
      - name: Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp:test
          severity: CRITICAL,HIGH
          exit-code: 1  # epäonnistu jos kriittisiä

  dast:
    runs-on: ubuntu-latest
    steps:
      - name: Start app
        run: docker-compose up -d
      
      - name: OWASP ZAP Baseline
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: http://localhost:8080`},
{id:'m13t2',title:'Semgrep custom rules',desc:'Kirjoita Semgrep-säännöt organisaatiospesifisiin ongelmiin: 1) Kiellä eval() käyttö, 2) Vaadi HTTPS-URL:it, 3) Tunnista kovakoodatut API-avaimet, 4) Tunnista vaarallinen subprocess-käyttö. Testaa oikeilla ja väärillä esimerkeillä.',diff:'hard'},
{id:'m13t3',title:'SBOM (Software Bill of Materials)',desc:'Luo SBOM ohjelmistollesi: 1) syft -sovellus (generoi SBOM CycloneDX/SPDX-muodossa), 2) Grype (haavoittuvuusskannaus SBOM:sta), 3) Integraatio CI/CD-pipelineen, 4. SBOM:n hyödyt toimitusketjuturvallisuudessa.',diff:'hard'},
{id:'m13t4',title:'Infrastructure as Code tietoturva',desc:'Terraform-koodin tietoturvatarkistus: 1) Checkov (150+ sääntöä), 2) tfsec, 3) Kirjoita custom policy (Open Policy Agent), 4) Tunnista: S3 julkinen, security group 0.0.0.0/0, salaamaton tietokanta.',diff:'hard'},
{id:'m13t5',title:'Runtime Application Self-Protection',desc:'RASP-konsepti: 1) Mitä RASP on (vs WAF), 2) Asenna OpenRASP tai käytä Sqreen (nyt Datadog), 3) Havaitse ja estä SQL-injektio ajonaikana, 4) Hälytykset. Vertaa WAF:iin.',diff:'hard'},
{id:'m13t6',title:'Secret Management Vault',desc:'HashiCorp Vault käytännössä: 1) Asenna (Docker), 2) KV secrets engine, 3) Dynamic secrets (tietokanta - uusi salasana joka kutsulle!), 4) Vault Agent injektoi secrets Podiin, 5. Python-integraatio (hvac-kirjasto).',diff:'hard'},
{id:'m13t7',title:'Container Runtime Security Falco',desc:'Falco runtime security: 1) Asenna Kubernetes:een, 2) Default-säännöt: shell prosessi kontissa, /etc kirjoitus, 3) Kirjoita custom rule: hälytä jos tietty tiedosto avataan, 4. Integroi Slack/PagerDuty.',diff:'hard'},
{id:'m13t8',title:'Software Supply Chain',desc:'Toimitusketjuturvallisuus: 1) SLSA (Supply-chain Levels for Software Artifacts) tasot, 2) Allekirjoita artifact (Sigstore/cosign), 3) Varmista allekirjoitus ennen deployia, 4. SolarWinds-tapauksen analyysi.',diff:'hard'},
{id:'m13t9',title:'Security as Code',desc:'Tietoturva koodina: 1) OPA (Open Policy Agent) käytäntöjen kirjoittaminen, 2) Gatekeeper Kubernetes-pääsynhallintaan, 3) Compliance as Code (InSpec), 4. Tietoturvatestit koodiin (pytest-security).',diff:'hard'},
{id:'m13t10',title:'Chaos Engineering tietoturvan kannalta',desc:'Chaos Engineering tietoturvaan: 1) Mitä tapahtuu kun sertifikaatti vanhenee (simuloi), 2) DDoS simulointi (load testing), 3) Random dependency failure, 4. GameDay: tee tarkoituksellinen tietoturvapoikkeama ja harjoittele IR:ää.',diff:'hard'},
{id:'m13t11',title:'API Security',desc:'API-tietoturva OWASP API Security Top 10:n mukaisesti: 1) Broken Object Level Authorization, 2) Excessive Data Exposure, 3) Rate limiting, 4) Injection, 5. Toteuta: autentikointi (JWT), authorisointi, rate limit, audit log.',diff:'hard'},
{id:'m13t12',title:'Threat modeling sovellukselle',desc:'Threat modeling prosessi: 1) STRIDE-metodologia, 2) Data Flow Diagram (DFD), 3) Tunnista luottamusrajat, 4. OWASP Threat Dragon -työkalu, 5. Mitigaatiot jokaiselle uhalle. Tee koko Flask-sovellukselle.',diff:'hard'},
{id:'m13t13',title:'Penetraatiotestaus CI/CD:tä vastaan',desc:'CI/CD-pipelinen tietoturvatestaus: 1) Pipeline injection (envvars), 2) Artifact poisoning, 3) Credential theft (GitHub secrets), 4. Supply chain via dependency, 5. Tyypillisten haavoittuvuuksien tarkistuslista.',diff:'hard'},

– Rajoitettu muisti (minimaaliset kirjastot)

– Suuri määrä (1 haavoittuvuus = miljoonat laitteet)

<strong>Yleiset haavoittuvuudet (OWASP IoT Top 10):</strong>
1. Heikot salasanat / oletustunnukset
2. Tarpeettomat verkkoportit
3. Turvaton ekosysteemi (pilvi, mobiili)
4. Päivitysmekanismin puute
5. Turvattomia vanhentuneita komponentteja
6. Riittämätön yksityisyyden suoja
7. Turvaton tiedonsiirto
8. Turvaton datan tallennus
9. Turvaton oletusasetukset
10. Fyysinen tietoturva puuttuu

<strong>Mirai-botnet (2016):</strong>
600,000 IoT-laitetta (kamerat, reitittimet), DDoS 1.2 Tbps. Syy: oletussalasanat.`},

3. Analyysi: kiinteä salasana, yksityiset avaimet, API-avaimet, haavoittuvat kirjastot (strings, grep)
4. Emulointi: QEMU (suorita firmware PC:llä), Firmadyne

{id:'m14t2',title:'Firmware-analyysi binwalkilla',desc:'Lataa harjoitusfirmware (esim. OpenWRT tai valmistajan sivulta). Analysoi binwalkilla: 1) Tunnista tiedostorakenne, 2) Pura sisältö, 3) Etsi kiinteitä salasanoja (grep -r "password"), 4. Etsi yksityisiä avaimia, 5. Etsi haavoittuvia kirjastoversioita.',diff:'hard',
solution:`#!/bin/bash
# Firmware analyysi

FIRMWARE="firmware.bin"

# 1. Tunnista rakenne
file \$FIRMWARE
binwalk \$FIRMWARE

# 2. Pura
mkdir -p firmware_extracted
binwalk -e -C firmware_extracted \$FIRMWARE

# 3. Etsi kiinteitä salasanoja
echo "=== Etsitään salasanoja ==="
grep -r -i "password\|passwd\|secret\|api_key" firmware_extracted/ 2>/dev/null | grep -v ".png\|.jpg"

# 4. Etsi SSH-avaimia
echo "=== SSH avaimet ==="
find firmware_extracted/ -name "*.pem" -o -name "*.key" -o -name "id_rsa" 2>/dev/null

# 5. Haavoittuvat kirjastot
echo "=== Kirjastoversiot ==="
find firmware_extracted/ -name "*.so" | xargs strings 2>/dev/null | grep -E "OpenSSL [0-9]|BusyBox [0-9]|libssl [0-9]"

# 6. Kiinteät tunnisteet
echo "=== Tunnisteet ==="
strings \$FIRMWARE | grep -E "admin|root|password|12345|default"

echo "Analyysi valmis. Tarkista firmware_extracted/ manuaalisesti."`},

     solution:`import random, string

def generate_password(length=12, use_upper=True, use_digits=True, use_symbols=True):
    chars = string.ascii_lowercase
    required = [random.choice(string.ascii_lowercase)]
    if use_upper:
        chars += string.ascii_uppercase
        required.append(random.choice(string.ascii_uppercase))
    if use_digits:
        chars += string.digits
        required.append(random.choice(string.digits))
    if use_symbols:
        symbols = "!@#$%^&*()"
        chars += symbols
        required.append(random.choice(symbols))
    
    remaining = [random.choice(chars) for _ in range(length - len(required))]
    password = required + remaining
    random.shuffle(password)
    return "".join(password)

for i in range(5):
    print(f"{i+1}. {generate_password(16)}")`},

     solution:`import functools, time

# 1. Rekursiivinen (hidas - eksponentiaalinen)

    if n <= 1: return n
    return fib_rekursio(n-1) + fib_rekursio(n-2)

# 2. Iteratiivinen (nopea - O(n))
def fib_iteratiivinen(n):
    a, b = 0, 1
    for _ in range(n):
        a, b = b, a + b
    return a

@functools.lru_cache(maxsize=None)

    if n <= 1: return n
    return fib_memo(n-1) + fib_memo(n-2)

def fib_generaattori():
    a, b = 0, 1
    while True:
        yield a
        a, b = b, a + b

    {id:'py_m2t3',title:'Pinot ja jonot',desc:'Toteuta Stack (LIFO) ja Queue (FIFO) luokkina dunder-metodeilla (__len__, __str__, __iter__, __contains__, __bool__). Testaa: sulkeiden tasapaino-tarkistaja Stackilla, BFS Queuella.',diff:'medium',
     solution:`from collections import deque

class Stack:
    def __init__(self): self._data = []
    def push(self, v): self._data.append(v)
    def pop(self):
        if not self._data: raise IndexError("Pino tyhjä")
        return self._data.pop()
    def peek(self): return self._data[-1] if self._data else None
    def __len__(self): return len(self._data)
    def __str__(self): return f"Stack{self._data}"
    def __iter__(self): return reversed(self._data)
    def __contains__(self, v): return v in self._data
    def __bool__(self): return bool(self._data)

class Queue:
    def __init__(self): self._data = deque()
    def enqueue(self, v): self._data.append(v)
    def dequeue(self):
        if not self._data: raise IndexError("Jono tyhjä")
        return self._data.popleft()
    def __len__(self): return len(self._data)
    def __str__(self): return f"Queue{list(self._data)}"

def tasapaino(s):
    pari = {"(":")", "[":"]", "{":"}"}
    pino = Stack()
    for c in s:
        if c in pari: pino.push(c)
        elif c in pari.values():
            if not pino or pari[pino.pop()] != c:
                return False
    return not pino

    print(f"{t}: {'✓' if tasapaino(t) else '✗'}")`},

     solution:`import functools, time, json
from datetime import datetime

def timer(fn):
    @functools.wraps(fn)
    def wrapper(*args, **kwargs):
        t = time.perf_counter()
        r = fn(*args, **kwargs)
        print(f"[timer] {fn.__name__}: {time.perf_counter()-t:.6f}s")
        return r
    return wrapper

def retry(max_yritykset=3, exceptions=(Exception,), viive=0.5):
    def dec(fn):
        @functools.wraps(fn)
        def wrapper(*args, **kwargs):
            for i in range(max_yritykset):
                try:
                    return fn(*args, **kwargs)
                except exceptions as e:
                    if i == max_yritykset - 1: raise
                    time.sleep(viive * 2**i)
        return wrapper

    @functools.wraps(fn)

    wrapper.cache = _c
    return wrapper

from datetime import datetime
from abc import ABC, abstractmethod

class Tili(ABC):
    def __init__(self, tilinumero, omistaja, saldo=0):
        self.tilinumero = tilinumero
        self.omistaja = omistaja
        self._saldo = saldo
        self._historia = []
    
    @property
    def saldo(self): return self._saldo
    
    def talleta(self, summa):
        if summa <= 0: raise ValueError("Summa oltava positiivinen")
        self._saldo += summa
        self._kirjaa(f"Talletus +{summa:.2f}€")
    
    @abstractmethod
    def nosta(self, summa): pass
    
    def _kirjaa(self, kuvaus):
        self._historia.append({
            "aika": datetime.now().isoformat(),
            "kuvaus": kuvaus,
            "saldo": self._saldo
        })
    
    def näytä_historia(self):
        for t in self._historia[-5:]:
            print(f"  {t['aika'][:19]} | {t['kuvaus']:30} | {t['saldo']:.2f}€")
    
    def __str__(self):
        return f"{self.__class__.__name__}({self.tilinumero}, {self.omistaja}: {self._saldo:.2f}€)"

class SäästöTili(Tili):
    def __init__(self, tilinumero, omistaja, korko=0.02, **kw):
        super().__init__(tilinumero, omistaja, **kw)
        self.korko = korko
    
    def nosta(self, summa):
        if summa > self._saldo:
            raise ValueError(f"Ei katetta (saldo {self._saldo:.2f}€)")
        self._saldo -= summa
        self._kirjaa(f"Nosto -{summa:.2f}€")
    
    def lisää_korko(self):
        korko_summa = self._saldo * self.korko
        self._saldo += korko_summa
        self._kirjaa(f"Korko +{korko_summa:.2f}€ ({self.korko*100}%)")

Asyncio: I/O-raskaat tehtävät (verkko, tiedostot)

   example:`import asyncio
import aiohttp
import time

async def hae_url(session, url):
    try:
        async with session.get(url, timeout=aiohttp.ClientTimeout(total=5)) as resp:
            return {"url": url, "status": resp.status, "ok": resp.ok}
    except Exception as e:
        return {"url": url, "virhe": str(e)}

async def main():
    urlit = [
        "https://httpbin.org/get",
        "https://httpbin.org/delay/1",
        "https://httpbin.org/status/404",
    ]
    
    alku = time.perf_counter()
    async with aiohttp.ClientSession() as session:
        tehtävät = [hae_url(session, url) for url in urlit]
        tulokset = await asyncio.gather(*tehtävät)
    
    kulunut = time.perf_counter() - alku
    for t in tulokset:
        print(t)
    print(f"Yhteensä: {kulunut:.2f}s")

asyncio.run(main())`,

    {id:'py_m6t1',title:'Asyncio-perusteet',desc:'Kirjoita async-funktiot: 1) simuloi I/O-odotus (asyncio.sleep), 2) suorita 10 tehtävää rinnakkain (gather), 3) mittaa aika vs peräkkäinen suoritus, 4) asyncio.Queue producer-consumer, 5) timeout käsittely.',diff:'medium',
     solution:`import asyncio
import time

async def lataa_sivu(url_nro, viive):
    await asyncio.sleep(viive)
    return f"Sivu {url_nro} ladattu ({viive}s)"

async def peräkkäinen():
    alku = time.perf_counter()
    tulokset = []
    for i in range(5):
        t = await lataa_sivu(i, 1)
        tulokset.append(t)
    print(f"Peräkkäinen: {time.perf_counter()-alku:.2f}s")

async def rinnakkainen():
    alku = time.perf_counter()
    tehtävät = [lataa_sivu(i, 1) for i in range(5)]
    tulokset = await asyncio.gather(*tehtävät)
    print(f"Rinnakkainen: {time.perf_counter()-alku:.2f}s")
    for t in tulokset:
        print(f"  {t}")

async def producer_consumer():
    jono = asyncio.Queue(maxsize=3)
    
    async def tuottaja():
        for i in range(5):
            await jono.put(f"viesti-{i}")
            print(f"Tuotettiin: viesti-{i}")
        await jono.put(None)  # sentinel
    
    async def kuluttaja():
        while True:
            item = await jono.get()
            if item is None: break
            print(f"Kulutettiin: {item}")
            jono.task_done()
    
    await asyncio.gather(tuottaja(), kuluttaja())

asyncio.run(rinnakkainen())
asyncio.run(producer_consumer())`},

import timeit

# Nopea vs hidas toteutus
def hidas_fibonacci(n):
    if n <= 1: return n
    return hidas_fibonacci(n-1) + hidas_fibonacci(n-2)

@lru_cache(maxsize=None)
def nopea_fibonacci(n):
    if n <= 1: return n
    return nopea_fibonacci(n-1) + nopea_fibonacci(n-2)

# Vertailu

hidas_aika = timeit.timeit(lambda: hidas_fibonacci(n), number=1)
nopea_aika = timeit.timeit(lambda: nopea_fibonacci(n), number=1)

    otsikko: str
    valmis: bool = False

tehtävät: list[Tehtävä] = []

@app.get("/tehtävät", response_model=list[Tehtävä])
async def hae_tehtävät():
    return tehtävät

async def luo_tehtävä(tehtävä: Tehtävä):

    tehtävät.append(tehtävä)

     solution:`from flask import Flask, request, jsonify, abort
import sqlite3, contextlib

app = Flask(__name__)

def get_db():
    db = sqlite3.connect(':memory:')
    db.row_factory = sqlite3.Row
    db.execute("CREATE TABLE IF NOT EXISTS users (id INTEGER PRIMARY KEY AUTOINCREMENT, nimi TEXT NOT NULL, email TEXT UNIQUE NOT NULL)")
    db.commit()
    return db

@app.route('/users', methods=['GET'])
def list_users():
    db = get_db()
    users = db.execute("SELECT * FROM users").fetchall()
    return jsonify([dict(u) for u in users])

@app.route('/users', methods=['POST'])
def create_user():
    data = request.get_json() or {}
    if 'nimi' not in data or 'email' not in data:
        abort(400, "nimi ja email vaaditaan")
    db = get_db()
    cur = db.execute("INSERT INTO users (nimi, email) VALUES (?, ?)", (data['nimi'], data['email']))
    db.commit()
    return jsonify({"id": cur.lastrowid, **data}), 201

@app.route('/users/<int:id>', methods=['GET'])
def get_user(id):
    db = get_db()
    user = db.execute("SELECT * FROM users WHERE id=?", (id,)).fetchone()
    if not user:
        abort(404, "Käyttäjää ei löydy")
    return jsonify(dict(user))

@app.errorhandler(404)
def not_found(e): return jsonify({"virhe": str(e)}), 404
@app.errorhandler(400)
def bad_request(e): return jsonify({"virhe": str(e)}), 400`},

from pathlib import Path

# Tiedosto-operaatiot
def järjestä_lataukset(kansio: Path):
    tyypit = {
        '.pdf': 'Dokumentit',
        '.jpg': 'Kuvat', '.png': 'Kuvat',
        '.mp4': 'Videot', '.mp3': 'Musiikki',
    }
    for tiedosto in kansio.iterdir():
        if tiedosto.is_file():
            kohde = kansio / tyypit.get(tiedosto.suffix.lower(), 'Muut')

from collections import deque

# Binary search O(log n)
def binäärihaku(lista, kohde):
    vasen, oikea = 0, len(lista) - 1
    while vasen <= oikea:
        keski = (vasen + oikea) // 2
        if lista[keski] == kohde: return keski
        elif lista[keski] < kohde: vasen = keski + 1
        else: oikea = keski - 1
    return -1

# Merge sort O(n log n)
def merge_sort(lista):
    if len(lista) <= 1: return lista
    mid = len(lista) // 2
    vasen = merge_sort(lista[:mid])
    oikea = merge_sort(lista[mid:])
    return merge(vasen, oikea)

def merge(v, o):
    tulos, i, j = [], 0, 0
    while i < len(v) and j < len(o):
        if v[i] <= o[j]: tulos.append(v[i]); i += 1
        else: tulos.append(o[j]); j += 1
    return tulos + v[i:] + o[j:]`,

def bubble_sort(lst):
    lst = lst[:]
    n = len(lst)
    for i in range(n):
        for j in range(n - i - 1):
            if lst[j] > lst[j+1]:
                lst[j], lst[j+1] = lst[j+1], lst[j]
    return lst

def merge_sort(lst):
    if len(lst) <= 1: return lst
    m = len(lst)//2
    L, R = merge_sort(lst[:m]), merge_sort(lst[m:])
    res, i, j = [], 0, 0
    while i<len(L) and j<len(R):
        if L[i]<=R[j]: res.append(L[i]); i+=1
        else: res.append(R[j]); j+=1
    return res+L[i:]+R[j:]

    {id:'js_m1t3',title:'Taulukko-operaatiot kattavasti',desc:'Kirjoita oma versio (ilman sisäänrakennettuja metodeja): map, filter, reduce, find, findIndex, some, every, flat, flatMap. Testaa jokainen alkuperäiseen verraten. Lisää: zip (yhdistä kaksi taulukkoa pareiksi).',diff:'medium',
     solution:`// Omat implementaatiot
function myMap(arr, fn) {
  const tulos = [];
  for (let i = 0; i < arr.length; i++) tulos.push(fn(arr[i], i, arr));
  return tulos;
}

function myFilter(arr, fn) {
  const tulos = [];
  for (let i = 0; i < arr.length; i++) if (fn(arr[i], i, arr)) tulos.push(arr[i]);
  return tulos;
}

function myReduce(arr, fn, alkuarvo) {
  let acc = alkuarvo !== undefined ? alkuarvo : arr[0];
  const alku = alkuarvo !== undefined ? 0 : 1;
  for (let i = alku; i < arr.length; i++) acc = fn(acc, arr[i], i, arr);
  return acc;
}

function myFlat(arr, syvyys = 1) {
  if (syvyys === 0) return arr.slice();
  return myReduce(arr, (acc, val) => {
    return acc.concat(Array.isArray(val) ? myFlat(val, syvyys - 1) : val);
  }, []);
}

function zip(...arrays) {
  const minLen = Math.min(...arrays.map(a => a.length));
  return Array.from({ length: minLen }, (_, i) => arrays.map(a => a[i]));
}

// Testit
const nums = [1, 2, 3, 4, 5];
console.log("map:", myMap(nums, x => x * 2));
console.log("filter:", myFilter(nums, x => x % 2 === 0));
console.log("reduce sum:", myReduce(nums, (a, b) => a + b, 0));
console.log("zip:", zip([1,2,3], ["a","b","c"]));`},
    {id:'js_m1t4',title:'Merkkijono-metodit',desc:'Toteuta käsin: padStart, padEnd, trimStart, trimEnd, repeat, startsWith, endsWith, includes, replaceAll, at. Testaa reunatapaukset. Lisää: camelCase→snake_case, snake_case→camelCase, titleCase, truncate(n, "...").',diff:'medium',
     solution:`const camelToSnake = str =>
  str.replace(/[A-Z]/g, letter => \`_\${letter.toLowerCase()}\`);

const snakeToCamel = str =>
  str.replace(/_([a-z])/g, (_, letter) => letter.toUpperCase());

const titleCase = str =>
  str.toLowerCase().replace(/\\b\\w/g, c => c.toUpperCase());

const truncate = (str, n, ellipsis = "...") =>
  str.length > n ? str.slice(0, n - ellipsis.length) + ellipsis : str;

// Omat implementaatiot
const myPadStart = (str, n, fill = " ") => {
  const puuttuu = n - str.length;
  if (puuttuu <= 0) return str;
  const täyte = fill.repeat(Math.ceil(puuttuu / fill.length)).slice(0, puuttuu);
  return täyte + str;
};

console.log(camelToSnake("myVariableName"));    // my_variable_name

    {id:'js_m1t5',title:'Tarkista: palindromi, anagrammi, pangram',desc:'Funktiot: isPalindrome(str), isAnagram(s1, s2), isPangram(str) (sisältää kaikki a-z). Tee kaikki case-insensitive. Lisää: findAllPalindromes(arr), groupAnagrams(words). Testaa kattavasti.',diff:'easy',
     solution:`const isPalindrome = str => {
  const puhdas = str.toLowerCase().replace(/[^a-zäöå]/g, "");
  return puhdas === [...puhdas].reverse().join("");
};

const isAnagram = (s1, s2) => {
  const norm = s => [...s.toLowerCase()].sort().join("");
  return norm(s1) === norm(s2);
};

const isPangram = str => {
  const kirjaimet = new Set(str.toLowerCase().replace(/[^a-z]/g, ""));
  return kirjaimet.size === 26;
};

const groupAnagrams = words => {
  const ryhmät = {};
  for (const sana of words) {
    const avain = [...sana.toLowerCase()].sort().join("");
    (ryhmät[avain] = ryhmät[avain] || []).push(sana);
  }
  return Object.values(ryhmät).filter(r => r.length > 1);
};

console.log(isPalindrome("A man a plan a canal Panama"));
console.log(isAnagram("listen", "silent"));
console.log(groupAnagrams(["ate", "eat", "tea", "tan", "nat", "bat"]));`},

   example:`// Retry-logiikka
async function fetchWithRetry(url, options = {}, retries = 3) {
  for (let i = 0; i < retries; i++) {
    try {
      const resp = await fetch(url, options);
      if (!resp.ok) throw new Error(\`HTTP \${resp.status}\`);
      return await resp.json();
    } catch (err) {
      if (i === retries - 1) throw err;
      const delay = Math.min(1000 * 2 ** i, 10000);
      await new Promise(r => setTimeout(r, delay));
      console.log(\`Yritys \${i + 2}/\${retries}...\`);
    }
  }
}

// Aikakatkaisu
function withTimeout(promise, ms) {
  return Promise.race([
    promise,
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error("Timeout")), ms)
    ),
  ]);
}`,

    {id:'js_m3t2',title:'Fetch API kattavasti',desc:'Tee API-clientti-luokka: GET/POST/PUT/PATCH/DELETE, automaattiset headerit, Bearer token, refresh token logiikka, request interceptors, response transformaatio, error handling, abort signal.',diff:'hard',
     solution:`class ApiClient {
  constructor(baseURL, options = {}) {
    this.baseURL = baseURL;
    this.token = options.token || null;
    this.interceptors = { request: [], response: [] };
  }

  setToken(token) { this.token = token; }

  async request(method, endpoint, data = null, options = {}) {
    const url = \`\${this.baseURL}\${endpoint}\`;
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), options.timeout || 10000);

    const config = {
      method,
      headers: {
        "Content-Type": "application/json",
        ...(this.token ? { Authorization: \`Bearer \${this.token}\` } : {}),
        ...options.headers,
      },
      signal: controller.signal,
      ...(data ? { body: JSON.stringify(data) } : {}),
    };

    // Request interceptors
    for (const interceptor of this.interceptors.request) {
      await interceptor(config);
    }

    try {
      const resp = await fetch(url, config);
      clearTimeout(timeout);

      if (!resp.ok) {
        const errData = await resp.json().catch(() => ({}));
        throw Object.assign(new Error(\`HTTP \${resp.status}\`), {
          status: resp.status, data: errData
        });
      }

      let result = await resp.json();
      for (const interceptor of this.interceptors.response) {
        result = await interceptor(result, resp);
      }
      return result;
    } catch (err) {
      if (err.name === "AbortError") throw new Error("Pyyntö aikakatkaistiin");
      throw err;
    }
  }

  get(endpoint, options) { return this.request("GET", endpoint, null, options); }
  post(endpoint, data, options) { return this.request("POST", endpoint, data, options); }
  put(endpoint, data, options) { return this.request("PUT", endpoint, data, options); }
  delete(endpoint, options) { return this.request("DELETE", endpoint, null, options); }
}

const api = new ApiClient("https://jsonplaceholder.typicode.com");

   example:`// Iterator protocol
class Range {
  constructor(start, end, step = 1) {
    this.start = start; this.end = end; this.step = step;
  }

  [Symbol.iterator]() {
    let current = this.start;
    const { end, step } = this;
    return {
      next() {
        if (current <= end) {
          const value = current;
          current += step;
          return { value, done: false };
        }
        return { value: undefined, done: true };
      }
    };
  }
}

for (const n of new Range(1, 10, 2)) {
  console.log(n); // 1, 3, 5, 7, 9
}

// Spread toimii myös
console.log([...new Range(1, 5)]); // [1, 2, 3, 4, 5]

// Generator
function* fibonacci() {
  let [a, b] = [0, 1];
  while (true) {
    yield a;
    [a, b] = [b, a + b];
  }
}

const fib = fibonacci();
const first10 = Array.from({ length: 10 }, () => fib.next().value);`,

     solution:`class InfiniteCounter {
  constructor(start = 0, step = 1) { this.n = start; this.step = step; }
  [Symbol.iterator]() {
    return {
      next: () => ({ value: (this.n += this.step) - this.step, done: false })
    };
  }
}

class Cycle {
  constructor(items) { this.items = items; }
  [Symbol.iterator]() {
    let i = 0;
    return { next: () => ({ value: this.items[i++ % this.items.length], done: false }) };
  }
}

function* zip(...iterables) {
  const iters = iterables.map(i => i[Symbol.iterator]());
  while (true) {
    const nexts = iters.map(i => i.next());
    if (nexts.some(n => n.done)) return;
    yield nexts.map(n => n.value);
  }

   example:`// Debounce
function debounce(fn, delay) {
  let timeout
  return function(...args) {
    clearTimeout(timeout)
    timeout = setTimeout(() => fn.apply(this, args), delay)
  }
}

// Throttle
function throttle(fn, limit) {
  let lastRun = 0
  return function(...args) {
    const now = Date.now()
    if (now - lastRun >= limit) {
      lastRun = now
      return fn.apply(this, args)
    }
  }
}

// requestAnimationFrame animaatio
function animate(elementti, tavoite, kesto) {
  const alku = performance.now()
  const alku_arvo = parseInt(getComputedStyle(elementti).left)
  
  function vaihe(nyt) {
    const kulut = Math.min((nyt - alku) / kesto, 1)
    const easing = kulut < 0.5 ? 2*kulut*kulut : -1+(4-2*kulut)*kulut
    elementti.style.left = alku_arvo + (tavoite - alku_arvo) * easing + "px"
    if (kulut < 1) requestAnimationFrame(vaihe)
  }
  
  requestAnimationFrame(vaihe)
}`,

   theory:`REACT PERUSTEITA:

Custom Hooks:
function useLocalStorage(key, defaultValue) {
  const [arvo, setArvo] = useState(() => {
    try { return JSON.parse(localStorage.getItem(key)) ?? defaultValue }
    catch { return defaultValue }
  })
  useEffect(() => {
    localStorage.setItem(key, JSON.stringify(arvo))
  }, [key, arvo])
  return [arvo, setArvo]
}

   example:`import { useState, useEffect, useCallback } from 'react'

function useFetch(url) {
  const [data, setData] = useState(null)
  const [loading, setLoading] = useState(true)
  const [error, setError] = useState(null)

  useEffect(() => {
    const controller = new AbortController()
    setLoading(true)
    fetch(url, { signal: controller.signal })
      .then(r => r.json())
      .then(setData)
      .catch(e => { if (e.name !== 'AbortError') setError(e) })
      .finally(() => setLoading(false))
    return () => controller.abort()
  }, [url])

  return { data, loading, error }
}

// Käyttö
function KäyttäjäLista() {
  const { data, loading, error } = useFetch('/api/käyttäjät')
  if (loading) return <div>Ladataan...</div>
  if (error) return <div>Virhe: {error.message}</div>
  return <ul>{data?.map(k => <li key={k.id}>{k.nimi}</li>)}</ul>
}`,

  {id:'js_m10', title:'Node.js & Backend', desc:'Express, Fastify, tietokannat, autentikaatio',
   theory:`NODE.JS BACKEND:

   example:`import Fastify from 'fastify'
import { z } from 'zod'

const app = Fastify({ logger: true })

// Schema validointi (automaattinen)
const KäyttäjäSchema = z.object({
  nimi: z.string().min(2),
  email: z.string().email(),
})

const käyttäjät = new Map()

app.get('/käyttäjät', async () => {
  return Array.from(käyttäjät.values())
})

app.post('/käyttäjät', async (request, reply) => {
  const tulos = KäyttäjäSchema.safeParse(request.body)
  if (!tulos.success) {
    return reply.status(400).send({ virhe: tulos.error.flatten() })
  }
  const id = crypto.randomUUID()
  const käyttäjä = { id, ...tulos.data }
  käyttäjät.set(id, käyttäjä)
  return reply.status(201).send(käyttäjä)
})

await app.listen({ port: 3000 })`,

   example:`/* Perus selektori-esimerkkejä */
/* Attribute selectors */
input[type="text"] { border: 1px solid #ccc; }
a[href^="https"]::after { content: " 🔒"; }

/* Pseudo-luokat */
li:nth-child(2n) { background: #f0f0f0; }  /* parilliset */
li:nth-child(3n+1) { color: red; }          /* 1., 4., 7. */
p:not(.poikkeus) { margin: 1rem 0; }

/* Custom Properties */
:root {
  --väri-pää: hsl(250, 90%, 60%);
  --väri-tumma: hsl(250, 90%, 40%);
  --säde: 0.5rem;
  --siirtymä: 200ms ease;
}

.nappi {
  background: var(--väri-pää);
  border-radius: var(--säde);
  transition: background var(--siirtymä);
}
.nappi:hover { background: var(--väri-tumma); }

/* Responsiiviset koot */
h1 {
  font-size: clamp(1.5rem, 4vw, 3rem);
  line-height: 1.2;
}`,

   theory:`FLEXBOX:
.container {

  {id:'html_m5', title:'CSS Animaatiot & Siirtymät', desc:'Transitions, keyframes, scroll animations',
   theory:`TRANSITIONS:
transition: property duration timing-function delay;
transition: all 0.3s ease;
transition: opacity 0.2s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);

Suosi: opacity, transform (GPU-kiihdytys)
Vältä: width, height, top, left (trigger layout)

KEYFRAME-ANIMAATIOT:
@keyframes slideIn {
  from { transform: translateX(-100%); }
  to   { transform: translateX(0); }
}

.elementti {
  animation: slideIn 0.5s ease forwards;
  animation-delay: 0.2s;
  animation-iteration-count: infinite;
  animation-direction: alternate;
  animation-fill-mode: forwards;
}

prefers-reduced-motion:
@media (prefers-reduced-motion: reduce) {
  * { animation-duration: 0.01ms !important; }
}

SCROLL ANIMATIONS (uusi):
@keyframes vaihdu { from { opacity: 0; } to { opacity: 1; } }

.elementti {
  animation: vaihdu linear both;
  animation-timeline: view();
  animation-range: entry 25% cover 50%;
}`,
   example:`/* Bounce-animaatio */
@keyframes bounce {
  0%, 100% { transform: translateY(0); animation-timing-function: ease-in; }
  50%       { transform: translateY(-20px); animation-timing-function: ease-out; }
}

/* Shimmer loading skeleton */
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

.skeleton {
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 4px;
}

/* View Transition API */
@keyframes fade-in { from { opacity: 0; } }
@keyframes slide-from-right {
  from { transform: translateX(30px); opacity: 0; }
}

::view-transition-old(root) { animation: none; }
::view-transition-new(root) { animation: fade-in 0.3s ease; }`,
   tasks:[
    {id:'html_m5t1',title:'Nappi-animaatiot',desc:'10 eri nappiefektiä CSS:llä: 1) ripple-klikkaus, 2) ladataan spinner, 3) shake virheelle, 4) bounce menestys, 5) neon glow, 6) magneetti hover (JS tarvitaan), 7) fill vasemmalta, 8) border-piirros, 9) 3D-paine, 10) emoji-räjähdys.',diff:'medium',
     solution:`/* 1. Ripple */
.nappi-ripple {
  position: relative;
  overflow: hidden;
}
.nappi-ripple::after {
  content: "";
  position: absolute;
  inset: 50%;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  transform: scale(0);
  transition: inset 0.5s, transform 0.5s, opacity 0.5s;
  opacity: 1;
}
.nappi-ripple:active::after {
  inset: -100%;
  transform: scale(1);
  opacity: 0;
}

/* 2. Spinner */
.nappi-lataa .spinner {
  display: inline-block;
  width: 1em;
  height: 1em;
  border: 2px solid currentColor;
  border-top-color: transparent;
  border-radius: 50%;
  animation: pyöri 0.6s linear infinite;
}
@keyframes pyöri { to { transform: rotate(360deg); } }

/* 3. Shake */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-4px); }
  40%, 80% { transform: translateX(4px); }
}
.nappi-virhe { animation: shake 0.4s ease; }

/* 4. Bounce menestys */
@keyframes bounce-in {
  0% { transform: scale(1); }
  30% { transform: scale(1.1); }
  60% { transform: scale(0.95); }
  100% { transform: scale(1); }
}
.nappi-ok { animation: bounce-in 0.5s ease; }`},

  {id:'html_m8', title:'Saavutettavuus (A11y)', desc:'WCAG 2.1, ARIA, keyboard, screen readers',
   theory:`WCAG 2.1 -suuntaviivat (Web Content Accessibility Guidelines):

4 PERIAATETTA (POUR):
Perceivable: sisältö havaittavissa (alt-teksti, captions)
Operable: toiminnot käytettävissä (keyboard, riittävä aika)
Understandable: sisältö ymmärrettävissä (kieli, virheilmoitukset)
Robust: yhteensopiva apuvälineiden kanssa

TÄRKEITÄ VAATIMUKSIA:
1.1.1 Non-text content: alt-teksti kaikille kuville
1.4.3 Contrast: 4.5:1 (normaaliteksti), 3:1 (iso teksti)
2.1.1 Keyboard: kaikki toiminnot näppäimistöllä
2.4.7 Focus Visible: fokus näkyy
3.3.1 Error Identification: virheet tunnistetaan ja kuvataan

KEYBOARD NAVIGAATIO:
Tab / Shift+Tab: elementtien välillä
Enter / Space: aktivointi
Escape: sulje (modal, dropdown)
Nuolinäppäimet: valinnat listassa`,
   example:`<!-- Saavutettava navigaatio -->
<nav aria-label="Päänavigaatio">
  <ul role="list">
    <li><a href="/" aria-current="page">Etusivu</a></li>
    <li><a href="/tietoa">Tietoa</a></li>
  </ul>
</nav>

<!-- Skip link (ensimmäinen elementti) -->
<a href="#main" class="skip-link">Siirry pääsisältöön</a>

<!-- Focus visible CSS -->
:focus-visible {
  outline: 3px solid #6c63ff;
  outline-offset: 2px;
}

/* Ei outline vain hiirikäyttäjille */
:focus:not(:focus-visible) {
  outline: none;
}`,
   tasks:[
    {id:'html_m8t1',title:'Kontrastisuhde ja värit',desc:'Tarkista ja korjaa värikontrastit: 1) Chrome DevTools accessibility panel, 2) axe-core selainjatke, 3) Laadi väripaletti joka täyttää AA-tason (4.5:1). Huomioi: tumma teema, hover-tilat, focus-indikaattorit.',diff:'easy'},

    {id:'html_m8t4',title:'ARIA patterns',desc:'Toteuta ARIA design patternit (APG): 1) Accordion (aria-expanded), 2) Dialog (role=dialog, aria-modal, focus trap), 3) Tabs (role=tablist/tab/tabpanel), 4. Menu (role=menubar/menu/menuitem), 5. Combobox.',diff:'hard'},

    {id:'html_m8t6',title:'Kognitiivinen saavutettavuus',desc:'Kognitiivinen saavutettavuus: 1) Selkeä kieli (Flesch-Kincaid), 2) Riittävä aika tehtäville (ei auto-timeout), 3. Virheilmoitukset ystävällisiä, 4. Muistia ei kuormiteta liikaa, 5. Johdonmukainen navigaatio.',diff:'medium'},
    {id:'html_m8t7',title:'Video ja multimedia saavutettavuus',desc:'Multimedia-saavutettavuus: 1) Videot tekstitykset (WebVTT), 2) Audio description, 3. Pause/stop/hide animaatiot, 4. Ei pelkkä väri informaation välittämiseen, 5. Taustamusiikin äänenvoimakkuus kontrolli.',diff:'medium'},
    {id:'html_m8t8',title:'Lomake saavutettavuus',desc:'Saavutettava lomake: 1) Kaikki labelit (for+id tai aria-label), 2) Virheilmoitukset (aria-describedby), 3. aria-required vs required, 4. Autocomplete-attribuutit, 5. Group fieldset+legend, 6. Ohjetekstit.',diff:'medium'},

  {id:'html_m9', title:'CSS Edistynyt & Preprocessorit', desc:'SASS, CSS-in-JS, design systems',

  {id:'html_m10', title:'SVG & Kaaviot', desc:'SVG, D3.js, animaatiot, infografiikka',
   theory:`SVG (Scalable Vector Graphics):

SVG peruselementit:
<circle cx="50" cy="50" r="40" fill="blue"/>
<rect x="10" y="10" width="80" height="60" rx="8"/>
<path d="M 10 10 L 90 90 Z" stroke="red"/>
<text x="50" y="50" text-anchor="middle">Teksti</text>
<g transform="translate(100,100) rotate(45)">...</g>

SVG koordinaatisto:
viewBox="0 0 100 100" — sisäinen koordinaatisto
width/height — näyttökoko (ei vaikuta sisältöön)

SVG animaatiot:
<animate attributeName="r" from="40" to="10" dur="1s"/>
CSS: animation, transition SVG-elementeille

D3.js — data-driven documents:
Sitoo dataa DOM-elementteihin
Generoi SVG:tä dynaamisesti
Skaalat (scale), akselit, zoom`,
   example:`// D3.js viivakuvaaja
import * as d3 from 'd3'

const data = [10, 30, 15, 40, 25, 60, 35]
const w = 400, h = 200, m = { top:20, right:20, bottom:30, left:40 }

const svg = d3.select('#kaavio').append('svg')
  .attr('viewBox', \`0 0 \${w} \${h}\`)

const x = d3.scaleLinear().domain([0, data.length-1]).range([m.left, w-m.right])
const y = d3.scaleLinear().domain([0, d3.max(data)]).range([h-m.bottom, m.top])

const viiva = d3.line()
  .x((_, i) => x(i))
  .y(d => y(d))
  .curve(d3.curveCatmullRom)

svg.append('path')
  .datum(data)
  .attr('d', viiva)
  .attr('fill', 'none')
  .attr('stroke', '#6c63ff')
  .attr('stroke-width', 2)

svg.append('g').attr('transform', \`translate(0,\${h-m.bottom})\`).call(d3.axisBottom(x))
svg.append('g').attr('transform', \`translate(\${m.left},0)\`).call(d3.axisLeft(y))`,

    {id:'html_m10t2',title:'D3.js peruskaaviot',desc:'D3.js: 1) Palkkikaavio (bar chart) datasta, 2) Viivakuvaaja (line chart), 3) Piirakkakaavio (pie/donut), 4) Akselit ja otsikot, 5) Väriskaala (d3.scaleSequential), 6) Tooltip (mouseover).',diff:'hard'},
    {id:'html_m10t3',title:'Interaktiivinen D3-kaavio',desc:'Lisää interaktiviisuus: 1) Zoom + pan (d3.zoom), 2) Brush (valitse alue), 3) Transition animaatiot datan vaihtuessa, 4) Linked views (valinta yhdessä → korostus toisessa), 5) Drill-down.',diff:'hard'},
    {id:'html_m10t4',title:'Canvas API kaaviot',desc:'HTML Canvas vs SVG: 1) Piirrä palkkikaavio Canvas:lla (requestAnimationFrame), 2) Interaktiivisuus (hiiren koordinaatit), 3) Mittaa suorituskyky (1000 elementtiä Canvas vs SVG), 4) OffscreenCanvas web worker.',diff:'hard'},
    {id:'html_m10t5',title:'Recharts React-kaaviot',desc:'Recharts (React-pohjainen): 1) LineChart, BarChart, PieChart, AreaChart, 2) Responsiivinen (ResponsiveContainer), 3) Custom Tooltip, 4) Custom Legend, 5) Animaatiot, 6) Kompose useita kaavioita.',diff:'medium'},
    {id:'html_m10t6',title:'SVG-animaatiot CSS:llä',desc:'SVG CSS-animaatiot: 1) stroke-dasharray + stroke-dashoffset (piirtämisanimaatio), 2) morphing (path d:n animointi), 3) Pyöriminen ja skaalaus, 4) Hover-efektit, 5) Scroll-triggered animaatiot.',diff:'hard'},
    {id:'html_m10t7',title:'Karttavisualisointi',desc:'Karttavisualisointi D3:lla: 1) GeoJSON Suomen kartta, 2) d3.geoMercator projektio, 3) Kuntakohtainen data (värjäys), 4) Zoom kuntaan, 5) Tooltip (kunnan nimi + data), 6) Leaflet.js vaihtoehto.',diff:'hard'},
    {id:'html_m10t8',title:'Force-directed graph',desc:'Verkkograafi D3:lla: 1) Nodes ja links data, 2) d3.forceSimulation, 3) forceLink + forceCharge + forceCenter, 4) Drag-and-drop, 5) Zoom, 6) Värikoodaus noden tyypillä, 7) Klikkaa → korostaa yhteydet.',diff:'hard'},

const canvas = document.getElementById('canvas')
const ctx = canvas.getContext('2d')

const partikkelit = Array.from({length: 200}, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  vx: (Math.random() - 0.5) * 2,
  vy: (Math.random() - 0.5) * 2,
  r: Math.random() * 3 + 1,
  väri: \`hsl(\${Math.random() * 360}, 70%, 60%)\`
}))

function animoi() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.1)'
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  partikkelit.forEach(p => {
    p.x = (p.x + p.vx + canvas.width) % canvas.width
    p.y = (p.y + p.vy + canvas.height) % canvas.height
    ctx.beginPath()
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2)
    ctx.fillStyle = p.väri
    ctx.fill()
  })
  requestAnimationFrame(animoi)
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function codeHtml(code,lang=''){
  return `<div class="code-block"><div class="code-hdr"><span class="code-lang">${esc(lang||'Koodi')}</span><button class="copy-btn" onclick="copyCode(this)">Kopioi</button></div><pre>${esc(code)}</pre></div>`;
}
function copyCode(btn){
  navigator.clipboard.writeText(btn.closest('.code-block').querySelector('pre').textContent);
  btn.textContent='Kopioitu!';setTimeout(()=>btn.textContent='Kopioi',2000);
}
