<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevAkademia — Nollasta Prohon</title>
<style>
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#22222f;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);--text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;--accent:#6c63ff;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--cyan:#06b6d4;--pink:#ec4899}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
.shell{display:flex;min-height:100vh}
/* SIDEBAR */
.sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;display:flex;flex-direction:column;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.logo{padding:20px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo-text{font-size:17px;font-weight:700;color:var(--text)}
.logo-sub{font-size:10px;color:var(--text3);margin-top:2px;font-family:monospace;letter-spacing:.1em}
.prog-wrap{padding:12px 20px 8px;flex-shrink:0}
.prog-label{font-size:11px;color:var(--text3);display:flex;justify-content:space-between;margin-bottom:5px}
.prog-track{height:3px;background:var(--bg4);border-radius:2px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--cyan));border-radius:2px;transition:width .4s}
.nav{padding:6px 0 20px;flex:1}
.nav-section{padding:14px 20px 3px;font-size:10px;color:var(--text3);font-family:monospace;letter-spacing:.12em;text-transform:uppercase}
.nav-item{padding:7px 20px;cursor:pointer;display:flex;align-items:center;gap:9px;font-size:13px;color:var(--text2);transition:all .15s;position:relative;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{color:var(--text);background:var(--bg3)}
.nav-item.active{color:var(--accent);background:rgba(108,99,255,.08)}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:2px;background:var(--accent);border-radius:0 2px 2px 0}
.nav-done{width:6px;height:6px;border-radius:50%;background:var(--green);margin-left:auto;flex-shrink:0}
.nav-partial{font-size:10px;color:var(--amber);font-family:monospace;margin-left:auto}
/* MAIN */
.main{margin-left:260px;flex:1;min-width:0}
.stats-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg2)}
.stat{padding:12px 24px;border-right:1px solid var(--border);text-align:center}
.stat-val{font-size:20px;font-weight:700;color:var(--text)}
.stat-lbl{font-size:10px;color:var(--text3);font-family:monospace}
/* HOME */
.home{padding:32px 40px}
.page-title{font-size:28px;font-weight:700;color:var(--text);margin-bottom:8px}
.page-sub{font-size:14px;color:var(--text2);line-height:1.6;max-width:600px;margin-bottom:28px}
.track-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.track-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all .2s}
.track-card:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-1px)}
.track-icon{font-size:28px;margin-bottom:12px}
.track-card h3{font-size:16px;font-weight:600;color:var(--text);margin-bottom:5px}
.track-card p{font-size:13px;color:var(--text2);line-height:1.5}
.track-footer{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.track-count{font-size:11px;color:var(--text3);font-family:monospace}
.pct-done{color:var(--green);font-size:12px;font-weight:600}
.pct-partial{color:var(--amber);font-size:12px;font-weight:600}
.pct-none{color:var(--text3);font-size:12px;font-weight:600}
.tag{font-size:10px;padding:3px 8px;border-radius:4px;font-family:monospace;display:inline-block;margin-bottom:10px}
.tag-blue{background:rgba(6,182,212,.12);color:var(--cyan)}
.tag-green{background:rgba(34,197,94,.12);color:var(--green)}
.tag-amber{background:rgba(245,158,11,.12);color:var(--amber)}
.tag-red{background:rgba(239,68,68,.12);color:var(--red)}
.tag-purple{background:rgba(108,99,255,.12);color:var(--accent)}
.tag-pink{background:rgba(236,72,153,.12);color:var(--pink)}
/* MOD PAGE */
.mod-page{padding:0 40px 40px}
.mod-header{padding:28px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
.breadcrumb{font-size:12px;color:var(--text3);font-family:monospace;margin-bottom:10px;cursor:pointer;display:inline-block;border:none;background:none}
.breadcrumb:hover{color:var(--text2)}
.mod-title{font-size:26px;font-weight:700;color:var(--text);margin-bottom:6px}
.mod-sub{font-size:14px;color:var(--text2)}
.mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.mod-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .2s}
.mod-card:hover{border-color:var(--border2);background:var(--bg3)}
.mod-card h4{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.mod-card p{font-size:12px;color:var(--text2);line-height:1.5}
.mod-card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
/* TASKS PAGE */
.tasks-page{padding:0 40px 60px;max-width:860px}
.tasks-header{padding:28px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
.sec-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.sec-title::before{content:'';width:3px;height:18px;background:var(--accent);border-radius:2px;flex-shrink:0}
.theory-p{font-size:14px;color:var(--text2);line-height:1.8;margin-bottom:12px}
.theory-p strong{color:var(--text);font-weight:500}
.code-block{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin:14px 0}
.code-hdr{padding:7px 14px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.code-lang{font-family:monospace;font-size:11px;color:var(--text3)}
.copy-btn{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 8px;border-radius:3px;border:1px solid var(--border);background:none;font-family:monospace;transition:all .15s}
.copy-btn:hover{color:var(--text);border-color:var(--border2)}
pre{padding:14px;overflow-x:auto;font-family:monospace;font-size:13px;line-height:1.7;color:#d4d4d4}
.info-box{border-radius:8px;padding:14px 18px;margin:14px 0;border-left:3px solid}
.info-blue{background:rgba(6,182,212,.06);border-color:var(--cyan)}
.info-green{background:rgba(34,197,94,.06);border-color:var(--green)}
.info-red{background:rgba(239,68,68,.06);border-color:var(--red)}
.info-amber{background:rgba(245,158,11,.06);border-color:var(--amber)}
.info-title{font-size:11px;font-family:monospace;font-weight:600;margin-bottom:6px}
.info-blue .info-title{color:var(--cyan)}.info-green .info-title{color:var(--green)}.info-red .info-title{color:var(--red)}.info-amber .info-title{color:var(--amber)}
.info-body{font-size:13px;color:var(--text2);line-height:1.7}
.divider{height:1px;background:var(--border);margin:24px 0}
.task-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px;transition:all .15s}
.task-item:hover{border-color:var(--border2);background:var(--bg3)}
.task-item.completed{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.04)}
.task-top{display:flex;align-items:flex-start;gap:12px}
.task-cb{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s;cursor:pointer;background:none}
.task-item.completed .task-cb{background:var(--green);border-color:var(--green)}
.chk{display:none}.task-item.completed .chk{display:block}
.task-info{flex:1}
.task-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px}
.task-item.completed .task-title{color:var(--text2);text-decoration:line-through}
.task-desc{font-size:13px;color:var(--text2);line-height:1.5}
.task-meta{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.diff{font-size:10px;font-family:monospace;padding:2px 7px;border-radius:3px}
.diff-easy{background:rgba(34,197,94,.1);color:var(--green)}
.diff-medium{background:rgba(245,158,11,.1);color:var(--amber)}
.diff-hard{background:rgba(239,68,68,.1);color:var(--red)}
.open-btn{font-size:11px;color:var(--accent);background:rgba(108,99,255,.1);border:none;padding:3px 10px;border-radius:4px;cursor:pointer;font-family:monospace;transition:all .15s;margin-left:auto}
.open-btn:hover{background:rgba(108,99,255,.2)}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:820px;overflow:hidden;margin:auto}
.modal-hdr{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3);gap:12px}
.modal-title{font-size:16px;font-weight:600;color:var(--text);flex:1;min-width:0}
.modal-diff{flex-shrink:0}
.modal-close{background:none;border:1px solid var(--border);color:var(--text2);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .15s;flex-shrink:0}
.modal-close:hover{color:var(--text);border-color:var(--border2)}
.modal-body{padding:0;max-height:80vh;overflow-y:auto}
.modal-tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--bg3);padding:0 24px;overflow-x:auto}
.modal-tab{padding:12px 16px;font-size:13px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:monospace;white-space:nowrap;border:none;background:none}
.modal-tab:hover{color:var(--text2)}
.modal-tab.active{color:var(--accent);border-bottom:2px solid var(--accent)}
.modal-panel{padding:24px;display:none}
.modal-panel.active{display:block}
.sol-btn{width:100%;padding:12px;background:rgba(108,99,255,.1);border:1px solid rgba(108,99,255,.3);color:var(--accent);border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all .15s;font-family:inherit}
.sol-btn:hover{background:rgba(108,99,255,.2)}
.sol-box{background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.2);border-radius:8px;padding:16px;margin-top:12px;display:none}
.sol-title{font-size:11px;font-family:monospace;color:var(--green);margin-bottom:10px}
.upload-area{border:2px dashed var(--border2);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;margin-top:16px;position:relative}
.upload-area:hover{border-color:var(--accent);background:rgba(108,99,255,.05)}
.upload-area.has-image{border-color:var(--green);border-style:solid;padding:8px}
.upload-icon{font-size:28px;margin-bottom:8px}
.upload-text{font-size:13px;color:var(--text3)}
.upload-sub{font-size:11px;color:var(--text3);margin-top:4px}
.upload-input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.preview-img{max-width:100%;border-radius:6px;display:none}
.upload-area.has-image .upload-icon,.upload-area.has-image .upload-text,.upload-area.has-image .upload-sub{display:none}
.upload-area.has-image .preview-img{display:block}
.clear-img{position:absolute;top:8px;right:8px;background:var(--red);color:white;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:11px;display:none}
.upload-area.has-image .clear-img{display:block}
/* Quiz */
.quiz-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:12px}
.quiz-q{font-size:14px;font-weight:500;color:var(--text);margin-bottom:12px}
.quiz-opt{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:10px 14px;margin-bottom:7px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;width:100%;text-align:left}
.quiz-opt:hover{border-color:var(--border2);color:var(--text)}
.quiz-opt.correct{border-color:var(--green);background:rgba(34,197,94,.08);color:var(--green)}
.quiz-opt.wrong{border-color:var(--red);background:rgba(239,68,68,.08);color:#fca5a5}
.quiz-fb{font-size:13px;padding:10px 14px;border-radius:7px;margin-top:8px;line-height:1.5}
.quiz-fb.ok{background:rgba(34,197,94,.08);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.quiz-fb.fail{background:rgba(239,68,68,.08);color:#fca5a5;border:1px solid rgba(239,68,68,.2)}
.modal-actions{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:500;border:none;transition:all .15s}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#16a34a}
.btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}.btn-secondary:hover{color:var(--text)}
.hidden{display:none!important}
.fade{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar">

</div>

<script>
// ===== TIETOTURVA MODULES =====
// Alkuperäiset moduulit (m1-m9) + uudet (m10-m14)
const MODULES = [

{id:'m1',title:'Tietokoneen perusteet',subtitle:'Binääri, laitteisto, käyttöjärjestelmät',tag:'Perustaso',tagClass:'tag-green',
theory:[
{title:'Miten tietokone toimii?',body:`Tietokone on laite joka suorittaa laskutoimituksia binääriluvuilla. Kaikki – tekstit, kuvat, videot, ohjelmat – ovat pohjimmiltaan nollia ja ykkösiä.

<strong>CPU (Central Processing Unit)</strong> on tietokoneen "aivot". Se suorittaa miljardia laskutoimitusta sekunnissa. Nykyiset prosessorit ovat moniytimisiä – jokaisella ytimellä on omat rekisterit ja välimuisti.

<strong>RAM (Random Access Memory)</strong> on väliaikainen muisti. Kun avaat ohjelman, se ladataan RAM:iin. Virran katketessa RAM tyhjenee. Tietoturvassa tärkeää: RAM:ssa voi olla salasanoja, salausavaimia ja muuta arkaluonteista dataa – muistidumppi voi paljastaa kaiken.

<strong>Kiintolevy (HDD/SSD)</strong> on pysyvä tallennus. SSD:t ovat nopeampia mutta datan palauttaminen voi silti onnistua vaikka tiedostot "poistetaan" – forensiikassa tärkeä tieto.

<strong>Käyttöjärjestelmä</strong> hallitsee laitteistoa ja tarjoaa abstraktiokerroksen ohjelmille. Linux, Windows, macOS – jokaisessa on omat tietoturvamekanisminsa ja -haavoittuvuutensa.`},
{title:'Binääri ja heksadesimaalit',body:`Tietokoneet käyttävät binääristä (2-kantainen) järjestelmää. Yksi bitti = 0 tai 1.

<strong>Binääri → Desimaali:</strong>
1010₂ = 1×2³ + 0×2² + 1×2¹ + 0×2⁰ = 8+0+2+0 = 10

<strong>Heksadesimaali (hex)</strong> on 16-kantainen: 0-9 ja A-F.
0xFF = 255 (desimaali) = 11111111 (binääri)
Käytetään: muistiosoitteet, värikoodit (#FF5733), MAC-osoitteet

<strong>ASCII ja Unicode:</strong>
ASCII: 'A' = 65, 'a' = 97, '0' = 48
Unicode: tukee kaikki maailman kirjoitusjärjestelmät
UTF-8: muuttuvanmittainen enkoodaus, ASCII-yhteensopiva

<strong>Tietoturvassa:</strong>
Base64 ei ole salaus – se on enkoodaus (helppo purkaa)
XOR on yksinkertainen salausoperaatio`}
],
tasks:[
{id:'m1t1',title:'Binäärimuunnokset',desc:'Muunna käsin (ei laskinta): 1) 42 desimaalista binääriksi, 2) 10110101₂ desimaaliksi, 3) 0xDEAD hexasta binääriksi, 4) 255 desimaalista hexaksi. Kirjoita algoritmi jokaiselle muunnokselle.',theory:`Binäärijärjestelmä on tietokoneen peruskieli. Muunnos desimaalista binääriksi: jaa toistuvasti 2:lla ja kirjaa jakojäännökset. Heksadesimaali (16-kantainen) tiivistää binäärin: 4 bittiä = 1 hex-merkki.`,example:`print(bin(42))           # 0b101010
print(hex(255))          # 0xff
print(int("101010", 2))  # 42
print(int("FF", 16))     # 255

# Käsin: 42 -> binääri
# 42/2=21 jäännös 0
# 21/2=10 jäännös 1
# 10/2=5  jäännös 0
# 5/2=2   jäännös 1
# 2/2=1   jäännös 0
# 1/2=0   jäännös 1
# Lue alhaalta: 101010`,diff:'easy',
solution:`# Python-ratkaisu (tarkistukseen)
luku = 42
print(f"Desimaali: {luku}")
print(f"Binääri: {bin(luku)[2:]}")     # 101010
print(f"Hex: {hex(luku)[2:].upper()}") # 2A

# Käsin: 42 → binääri
# 42 / 2 = 21 jäännös 0
# 21 / 2 = 10 jäännös 1
# 10 / 2 =  5 jäännös 0
# 5  / 2 =  2 jäännös 1
# 2  / 2 =  1 jäännös 0
# 1  / 2 =  0 jäännös 1
# Luetaan alhaalta ylös: 101010

# 10110101 → desimaali
# 1×128 + 0×64 + 1×32 + 1×16 + 0×8 + 1×4 + 0×2 + 1×1
# = 128 + 32 + 16 + 4 + 1 = 181

print(int('10110101', 2))  # 181
print(int('DEAD', 16))      # 57005`},
{id:'m1t2',title:'Käyttöjärjestelmän tietoturva-asetukset',desc:'Tutki oman käyttöjärjestelmän tietoturva-asetuksia: 1) Tarkista palomuuri (on/off, säännöt), 2) Tarkista käyttäjätilit ja oikeudet, 3) Listaa käynnissä olevat palvelut, 4) Tarkista automaattiset päivitykset. Raportoi löydöksistä.',theory:`Käyttöjärjestelmän kovennuksessa poistetaan kaikki tarpeeton ja suojataan jäljelle jäävä. Palomuuri, käyttäjätilien oikeudet ja automaattiset päivitykset ovat perusasioita.`,example:`import subprocess

# Palomuuri
result = subprocess.run(["ufw", "status"], capture_output=True, text=True)
print(result.stdout)

# Avoimet portit
result = subprocess.run(["ss", "-tlnp"], capture_output=True, text=True)
print(result.stdout)

# Käynnissä olevat palvelut
result = subprocess.run(["systemctl", "list-units", "--type=service", "--state=running"], capture_output=True, text=True)
print(result.stdout[:500])`,diff:'easy'},

{id:'m1t5',title:'Prosessipuun analyysi',desc:'Analysoi käynnissä olevat prosessit: ps aux, pstree, lsof. Tunnista: epäilyttävät prosessit (korkea CPU ilman syytä), outoja portteja kuuntelevat prosessit, lapsi-prosessit jotka eivät kuulu vanhempaansa.',theory:`Prosessipuu näyttää prosessien vanhempi-lapsi-suhteet. Epäilyttävää: cmd.exe joka on käynnistetty word.exe:stä, tai prosessi joka kuuntelee outoa porttia ilman tunnettua syytä.`,example:`import psutil

def analysoi_prosessit():
    epailyttavat = []

{id:'m1t6',title:'Tiedostojärjestelmän oikeudet',desc:'Linux-oikeudet käytännössä: chmod (numeraalisesti ja symbolisesti), chown, SUID/SGID/Sticky bit. Löydä SUID-tiedostot: find / -perm -4000. Selitä miksi SUID on tietoturvariski.',theory:`Linux-tiedosto-oikeudet: r=4, w=2, x=1. chmod 755 = rwxr-xr-x. SUID (4000) ajaa tiedoston omistajan oikeuksilla — vaarallinen jos omistaja on root. find -perm -4000 löytää SUID-tiedostot.`,example:`import os, stat

{id:'m1t7',title:'Kryptografinen hash-funktio',desc:'Laske SHA-256-hash tiedostoille Pythonilla. Osoita collision resistance: muuta yksi bitti ja näytä miten hash muuttuu täysin (avalanche effect). Vertaa MD5 vs SHA-1 vs SHA-256 vs SHA-3 nopeus ja turvallisuus.',theory:`Hash-funktio muuntaa minkä tahansa datan kiinteänmittaiseksi tiivisteeksi. SHA-256 tuottaa aina 256-bittisen (64 hex-merkkiä) tuloksen. Yksisuuntainen: tiivisteestä ei voi palauttaa alkuperäistä.`,example:`import hashlib

# SHA-256
viesti = "Hei maailma!"
hash256 = hashlib.sha256(viesti.encode()).hexdigest()
print(f"SHA-256: {hash256}")
print(f"Pituus: {len(hash256)} hex = 256 bittiä")

# Avalanche effect: yksi bitti muuttaa kaiken
viesti2 = "hei maailma!"  # pieni h
hash2 = hashlib.sha256(viesti2.encode()).hexdigest()
print(f"\nAlkuperäinen: {hash256[:16]}...")
print(f"Muutettu:     {hash2[:16]}...")
print("Täysin erilainen!")

# Tiedoston hash
def tiedosto_hash(polku):
    h = hashlib.sha256()
    with open(polku, "rb") as f:
        for lohko in iter(lambda: f.read(65536), b""):
            h.update(lohko)
    return h.hexdigest()`,diff:'easy',
solution:`import hashlib
import time

def laske_hash(data, algoritmi='sha256'):
    if isinstance(data, str):
        data = data.encode('utf-8')
    h = hashlib.new(algoritmi, data)
    return h.hexdigest()

# Avalanche effect
viesti1 = "Hei maailma!"
viesti2 = "hei maailma!"  # pieni kirjainmuutos

print(f"SHA-256 (iso H): {laske_hash(viesti1)}")
print(f"SHA-256 (pieni h): {laske_hash(viesti2)}")
print("Hashit ovat täysin erilaiset!")

# Nopeusvvertailu
for alg in ['md5', 'sha1', 'sha256', 'sha512']:
    alku = time.perf_counter()
    for _ in range(100000):
        hashlib.new(alg, b"testi").hexdigest()
    kulunut = time.perf_counter() - alku
    print(f"{alg:8}: {kulunut:.3f}s / 100k")`},
{id:'m1t8',title:'Base64 enkoodaus ja dekoodaus',desc:'Toteuta Base64 enkoodaus ja dekoodaus Pythonilla (käytä base64-moduulia). Selitä miksi Base64 EI ole salaus. Etsi Base64-enkoodattua dataa (CTF-haaste tai verkko). Tunnista Base64 regex-kaavalla.',theory:`Base64 muuntaa binääridatan ASCII-tekstiksi käyttäen 64 merkin aakkostoa. Se EI ole salaus — kuka tahansa voi purkaa sen. Käytetään datan siirtoon järjestelmissä jotka eivät tue binääriä.`,example:`import base64

# Enkoodaus
data = "Salainen viesti"
koodattu = base64.b64encode(data.encode()).decode()
print(f"Enkoodattu: {koodattu}")
# U2FsYWluZW4gdmllc3Rp

# Dekoodaus — kuka tahansa voi tehdä tämän!
purettu = base64.b64decode(koodattu).decode()
print(f"Purettu: {purettu}")

# Tunnistus
import re
def on_base64(s):
    pattern = r"^[A-Za-z0-9+/]+={0,2}$"
    return bool(re.match(pattern, s)) and len(s) % 4 == 0

print(on_base64("SGVsbG8="))   # True
print(on_base64("ei ole"))    # False`,diff:'easy'},
{id:'m1t9',title:'Lokitiedostojen analyysi',desc:'Analysoi Linux-lokitiedostoja: /var/log/auth.log (SSH-kirjautumiset), /var/log/syslog, /var/log/apache2/access.log. Kirjoita Python-skripti joka etsii: epäonnistuneet kirjautumiset, IP-osoitteet, kellon ajat.',theory:`Lokitiedostot ovat tietoturvan kultakaivos. /var/log/auth.log kirjaa kirjautumisyritykset. Brute force näkyy piikkinä epäonnistuneissa kirjautumisissa samasta IP:stä.`,example:`import re
from collections import Counter
from pathlib import Path

def analysoi_auth_loki(polku="/var/log/auth.log"):
    try:
        rivit = Path(polku).read_text().splitlines()
    except FileNotFoundError:
        print(f"Loki {polku} ei löydy")
        return

    # Epäonnistuneet SSH-kirjautumiset
    epäonnistuneet = [r for r in rivit if "Failed password" in r]
    
    # Poimi IP-osoitteet
    ip_pattern = re.compile(r"from (\d+\.\d+\.\d+\.\d+)")
    ip_lista = [ip_pattern.search(r).group(1) for r in epäonnistuneet if ip_pattern.search(r)]
    
    print(f"Epäonnistuneita kirjautumisia: {len(epäonnistuneet)}")
    print("Top 5 hyökkääjä-IP:")
    for ip, n in Counter(ip_lista).most_common(5):
        print(f"  {ip}: {n} kertaa")

analysoi_auth_loki()`,diff:'medium'},

{id:'m1t11',title:'ASCII-taide ja enkoodaukset',desc:'Kirjoita Pythonia: 1) Muunna teksti ASCII-koodeihin, 2) ROT13-salaus, 3) Morse-koodi enkoodaus/dekoodaus, 4) Binääri → teksti muunnos. Pura tämä: 01001000 01100101 01101001',theory:`ASCII (American Standard Code for Information Interchange) on 7-bittinen merkistö. A=65, a=97, 0=48. ROT13 kiertää kirjaimia 13 paikalla — sama operaatio purkaa ja salaa.`,example:`# ASCII ja enkoodaukset

{id:'m1t12',title:'Tiedostoformaattien tunnistus',desc:'Magic bytes: tiedostojen tunnistus ensimmäisistä tavuista. Kirjoita Python-skripti joka tunnistaa: PNG, JPG, PDF, ZIP, EXE, ELF ilman tiedostopäätettä. Vihjeitä: PNG = 89 50 4E 47, ZIP = 50 4B 03 04.',theory:`Magic bytes ovat tiedoston ensimmäiset tavut jotka kertovat oikean tiedostotyypin — riippumatta tiedostopäätteestä. PNG alkaa \x89PNG, ZIP alkaa PK, PDF alkaa %PDF.`,example:`MAGIC = {
    b"\x89PNG": "PNG-kuva",
    b"\xff\xd8\xff": "JPEG-kuva",
    b"%PDF": "PDF-dokumentti",
    b"PK\x03\x04": "ZIP-arkisto",
    b"MZ": "Windows EXE",
    b"\x7fELF": "Linux ELF-binääri",
    b"\x1f\x8b": "GZIP-pakattu",
    b"BM": "BMP-kuva",
}

def tunnista_tyyppi(polku):
    with open(polku, "rb") as f:
        header = f.read(8)
    for magic, nimi in MAGIC.items():
        if header.startswith(magic):
            return nimi
    return f"Tuntematon (header: {header[:4].hex()})"

# Testi
import tempfile
with tempfile.NamedTemporaryFile(suffix=".txt", delete=False) as f:
    f.write(b"\x89PNG\r\n\x1a\n")  # PNG magic bytes
    f.flush()
    print(tunnista_tyyppi(f.name))  # PNG-kuva`,diff:'medium'},
{id:'m1t13',title:'Salasanojen tallennushistoria',desc:'Tutki miten salasanoja on tallennettu läpi historian: plaintext, MD5, salted MD5, bcrypt, scrypt, Argon2. Demonstroi Pythonilla miksi MD5 on vaarallinen (laske hash, etsi rainbow tablesta). Näytä bcrypt:n hitaus (tarkoituksellinen).',theory:`Salasanojen tallennushistoria: 1970 plaintext → 1990 MD5 (nopea = helppo murtaa) → MD5+salt → bcrypt (1999, tarkoituksellisen hidas) → Argon2id (2015, nykypäivän standardi). Hitaus on tarkoituksellinen: vaikeuttaa brute forcea.`,example:`import hashlib, os, time
import bcrypt
from argon2 import PasswordHasher

salasana = b"käyttäjän_salasana"

# MD5 - EI KOSKAAN TUOTANTOON
md5 = hashlib.md5(salasana).hexdigest()
print(f"MD5 (nopea, vaarallinen): {md5[:20]}...")

# bcrypt - hidas tarkoituksella
alku = time.perf_counter()
bcrypt_hash = bcrypt.hashpw(salasana, bcrypt.gensalt(rounds=12))
print(f"bcrypt (rounds=12): {time.perf_counter()-alku:.2f}s")

# Tarkistus
print(f"bcrypt match: {bcrypt.checkpw(salasana, bcrypt_hash)}")

# Argon2id - paras
ph = PasswordHasher(time_cost=3, memory_cost=65536)
argon2_hash = ph.hash(salasana.decode())
print(f"Argon2id: {argon2_hash[:40]}...")`,diff:'medium'},
{id:'m1t14',title:'Tiedostojen eheystarkistus',desc:'Luo tiedoston eheystarkistusjärjestelmä: laske SHA-256-hashit kaikille tiedostoille kansiossa, tallenna JSON-tiedostoon, tarkista myöhemmin onko mikään muuttunut. Käytä: pathlib, hashlib, json.',theory:`File Integrity Monitoring (FIM) havaitsee luvattoman tiedostomuutokset laskemalla hashit ja vertaamalla niihin myöhemmin. AIDE ja Tripwire ovat tunnettuja FIM-työkaluja.`,example:`import hashlib, json
from pathlib import Path
from datetime import datetime

def laske_hash(polku):
    sha = hashlib.sha256()
    with open(polku, "rb") as f:
        for lohko in iter(lambda: f.read(65536), b""):
            sha.update(lohko)
    return sha.hexdigest()

def luo_baseline(kansio, tallennuspolku="baseline.json"):
    hashit = {}
    for p in Path(kansio).rglob("*"):
        if p.is_file():
            hashit[str(p)] = {"hash": laske_hash(p), "aika": datetime.now().isoformat()}
    json.dump(hashit, open(tallennuspolku, "w"), indent=2)
    print(f"Baseline: {len(hashit)} tiedostoa")

def tarkista_muutokset(kansio, baseline_polku="baseline.json"):
    baseline = json.load(open(baseline_polku))
    for p in Path(kansio).rglob("*"):
        if p.is_file():
            nykyinen = laske_hash(p)
            if str(p) in baseline and baseline[str(p)]["hash"] != nykyinen:
                print(f"MUUTOS: {p}")`,diff:'medium'},

{id:'m2',title:'Verkkoturvallisuus',subtitle:'TCP/IP, portit, protokollat, hyökkäykset',tag:'Perustaso',tagClass:'tag-green',
theory:[
{title:'TCP/IP ja OSI-malli',body:`Verkkoliikenne kulkee kerrosten kautta:

<strong>OSI 7-kerros malli:</strong>
7. Sovellus (HTTP, SSH, DNS, FTP)
6. Esitys (SSL/TLS, enkoodaus)
5. Istunto (yhteyden hallinta)
4. Kuljetus (TCP, UDP)
3. Verkko (IP, ICMP)
2. Siirtoyhteys (Ethernet, MAC)
1. Fyysinen (kaapelit, radiotaajuudet)

<strong>TCP vs UDP:</strong>
TCP: yhteyspohjainen, luotettava, järjestetty (HTTP, SSH, FTP)
UDP: yhteydetön, nopea, ei takuuta (DNS, VoIP, gaming)

<strong>TCP 3-way handshake:</strong>
Asiakas → SYN → Palvelin
Asiakas ← SYN-ACK ← Palvelin
Asiakas → ACK → Palvelin

<strong>Tärkeät portit:</strong>
20/21 FTP, 22 SSH, 23 Telnet, 25 SMTP
53 DNS, 80 HTTP, 443 HTTPS
3306 MySQL, 3389 RDP, 5432 PostgreSQL`},
{title:'Verkkoprotokollat ja haavoittuvuudet',body:`<strong>DNS (Domain Name System):</strong>
Muuntaa domain-nimet IP-osoitteiksi. Haavoittuvuudet: DNS poisoning (väärien tietueiden lisääminen välimuistiin), DNS hijacking, puuttuu autentikointi (DNSSEC korjaa).

<strong>ARP (Address Resolution Protocol):</strong>
Selvittää MAC-osoitteen IP-osoitteesta. ARP spoofing: hyökkääjä ilmoittaa omaksi MAC-osoitteekseen uhrin IP:n → man-in-the-middle.

<strong>HTTPS ja TLS:</strong>
TLS 1.3 on turvallisin (2018). TLS 1.0 ja 1.1 ovat vanhentuneet. Certificate pinning estää MITM-hyökkäykset. HSTS pakottaa HTTPS:n.

<strong>Yleisiä hyökkäyksiä:</strong>
Man-in-the-Middle (MITM): sieppaa liikenne
DoS/DDoS: ylikuormittaa palvelin
Port scanning: selvittää avoimet portit
Packet sniffing: kaappaa salaamatonta liikennettä`}
],

{id:'m2t1',title:'Nmap porttiskannaus',desc:'Asenna Nmap. Skannaa oma kone (127.0.0.1): 1) TCP SYN scan (-sS), 2) UDP scan (-sU), 3) OS tunnistus (-O), 4) Version detection (-sV), 5) Script scan (-sC). Selitä mitä jokainen vaihtoehto tekee ja miksi.',theory:`Nmap (Network Mapper) on monipuolisin verkkojenkartoitustyökalu. SYN scan (-sS) on "stealth" koska se ei täydennä TCP-kättelyä. -sV tunnistaa palveluversiot, -O käyttöjärjestelmän, -sC ajaa perusskriptit.`,example:`# Nmap peruskomennot (VAIN omiin järjestelmiin tai luvalla!)

{id:'m2t2',title:'Wireshark liikenteen analyysi',desc:'Asenna Wireshark. Kaappaa verkkoliikennettä 2 minuuttia (normaali selaus). Analysoi: 1) Montako pakettia? 2) Yleisin protokolla? 3) DNS-kyselyt (mitä domaineja haettiin?), 4) HTTP-liikenne (salaamattomat pyynnöt), 5) TLS-kättely.',theory:`Wireshark kaappaa verkkoliikennettä ja näyttää sen protokollittain purettuna. Suodattimet: "http" näyttää HTTP-liikenteen, "dns" DNS-kyselyt. Värikoodaus helpottaa analyysiä.`,example:`# Wireshark suodattimet
# http                     - HTTP-liikenne
# dns                      - DNS-kyselyt
# tcp.port == 443          - HTTPS
# ip.addr == 192.168.1.1   - tietty IP
# frame contains "password" - etsii sanaa

# tshark komentorivillä:
# tshark -i eth0 -w kaappaus.pcap        # kaappaa

from concurrent.futures import ThreadPoolExecutor

{id:'m2t6',title:'SSL/TLS-sertifikaatin analyysi',desc:'Analysoi TLS-sertifikaatteja: 1) openssl s_client -connect domain:443, 2) Lue sertifikaatin tiedot (voimassaolo, CA, SANs), 3) Python ssl-moduulilla: hae sertifikaatti ohjelmallisesti, 4) Tunnista heikko TLS-versio (1.0/1.1).',theory:`TLS-sertifikaatti todistaa palvelimen henkilöllisyyden. Sertifikaatti sisältää julkisen avaimen, voimassaoloajan, CN:n ja allekirjoittajan CA:n. Sertifikaattiketju: Root CA → Intermediate CA → palvelimen sertifikaatti.`,example:`import ssl, socket
from datetime import datetime

def analysoi_sertifikaatti(host, portti=443):
    konteksti = ssl.create_default_context()
    with konteksti.wrap_socket(socket.socket(), server_hostname=host) as s:
        s.connect((host, portti))
        sert = s.getpeercert()
    
    subject = dict(x[0] for x in sert["subject"])
    issuer = dict(x[0] for x in sert["issuer"])
    
    print(f"Domain:    {subject.get('commonName')}")
    print(f"Myöntäjä:  {issuer.get('organizationName')}")
    print(f"Vanhenee:  {sert['notAfter']}")
    
    # Tarkista voimassaolo
    vanhenee = datetime.strptime(sert["notAfter"], "%b %d %H:%M:%S %Y %Z")
    paiva_jaljella = (vanhenee - datetime.now()).days

{id:'m2t12',title:'Honeypot-palvelin',desc:'Tee yksinkertainen honeypot Pythonilla: kuuntele porteilla 21/23/80/443/3306, kirjaa kaikki yhteydenottoyritykset (IP, aika, mitä lähetettiin), analysoi yrityksiä. Lisää GeoIP-haku (ip-api.com).',theory:`Honeypot on houkutusjärjestelmä — näyttää oikealta mutta ei tee oikeaa työtä. Tarkoitus: havaita hyökkääjät ja kerätä tietoa heidän metodeistaan. Jokainen yhteydenotto on merkki epäilyttävästä toiminnasta.`,example:`import socket, threading, datetime, json
from pathlib import Path

kirjasto = []

def honeypot_portti(portti):
    s = socket.socket()
    s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
    s.bind(("0.0.0.0", portti))
    s.listen(5)
    
    while True:
        try:
            conn, addr = s.accept()
            tapahtuma = {
                "aika": datetime.datetime.now().isoformat(),
                "ip": addr[0],
                "portti": portti,
                "data": ""
            }
            try:
                data = conn.recv(1024)
                tapahtuma["data"] = data.decode(errors="replace")[:100]
            except:
                pass
            finally:
                conn.close()
            kirjasto.append(tapahtuma)
            print(f"HONEYPOT {portti}: yhteys {addr[0]}")
        except:
            pass

for p in [21, 23, 3306, 5432]:
    threading.Thread(target=honeypot_portti, args=(p,), daemon=True).start()`,diff:'hard'},

theory:[
{title:'OWASP Top 10 (2021)',body:`OWASP (Open Web Application Security Project) julkaisee listan kriittisimmistä web-haavoittuvuuksista:

<strong>A01 - Broken Access Control:</strong> Käyttäjä pääsee resursseihin joihin ei pitäisi. Esim: URL-manipulointi (/admin), IDOR (Insecure Direct Object Reference).

<strong>A02 - Cryptographic Failures:</strong> Heikko salaus, arkaluonteinen data selväkielisenä, vanhentunut TLS.

<strong>A03 - Injection:</strong> SQL-, LDAP-, OS-injektio. Käyttäjäsyöte tulkitaan komennoksi.

<strong>A04 - Insecure Design:</strong> Arkkitehtuurivirheet, puuttuvat uhkamallit.

<strong>A05 - Security Misconfiguration:</strong> Oletussalasanat, debug-moodit, tarpeettomat palvelut.

<strong>A06 - Vulnerable Components:</strong> Vanhentuneet kirjastot (Log4Shell, Heartbleed).

<strong>A07 - Authentication Failures:</strong> Heikot salasanat, session hallinta, credential stuffing.

<strong>A08 - Software & Data Integrity Failures:</strong> Supply chain -hyökkäykset, CI/CD-turvallisuus.

<strong>A09 - Security Logging Failures:</strong> Lokitus puuttuu tai on riittämätöntä.

<strong>A10 - SSRF (Server-Side Request Forgery):</strong> Palvelin tekee pyyntöjä hyökkääjän osoittamiin kohteisiin.`},
{title:'SQL-injektio syvällisesti',body:`SQL-injektio on #3 OWASP Top 10:ssä. Se mahdollistaa tietokannan manipuloinnin haitallisella syötteellä.

<strong>Klassinen injektio:</strong>
Haavoittuva: "SELECT * FROM users WHERE name='" + nimi + "'"
Hyökkäys: nimi = "' OR '1'='1" → kirjautuu sisään ilman salasanaa

<strong>Union-injektio:</strong>
' UNION SELECT username, password FROM users--

<strong>Blind SQL injektio:</strong>
Boolean: ' AND 1=1-- (tosi) vs ' AND 1=2-- (epätosi)
Time-based: ' AND SLEEP(5)-- (odottaa 5 sekuntia jos haavoittuva)

<strong>Suojaus:</strong>
1. Parametrisoidut kyselyt (EHDOTON)
2. Input validation (whitelist)
3. Least privilege tietokantakäyttäjälle
4. WAF (Web Application Firewall)
5. Error messages pois käytöstä (ei paljasta tietokantarakennetta)`}
],

{id:'m3t1',title:'SQL-injektio: haavoittuva Flask-sovellus',desc:'Luo tahallisen haavoittuva Flask+SQLite -sovellus (login-sivu). Osoita: 1) Kirjaudu sisään ilman tietämistä oikeaa salasanaa, 2) Kaada tietokanta DROP TABLE:lla, 3) Hae kaikki käyttäjät UNION:lla. Sitten korjaa käyttäen parametrisoituja kyselyitä.',theory:`SQL-injektio tapahtuu kun käyttäjän syöte liitetään suoraan SQL-lauseeseen. Hyökkääjä voi lisätä omaa SQL-koodia. Ainoa oikea korjaus: parametrisoidut kyselyt jotka erottavat koodin datasta.`,example:`import sqlite3

db = sqlite3.connect(":memory:")
db.execute("CREATE TABLE users (id INTEGER PRIMARY KEY, name TEXT, password TEXT)")
db.execute("INSERT INTO users VALUES (1, 'admin', 'salainen')")
db.commit()

# HAAVOITTUVA
def haavoittuva_login(nimi, salasana):
    q = f"SELECT * FROM users WHERE name='{nimi}' AND password='{salasana}'"
    # Hyökkäys: nimi = "admin'--"
    # SQL: SELECT * FROM users WHERE name='admin'--' AND password='...'
    return db.execute(q).fetchone()

# TURVALLINEN
def turvallinen_login(nimi, salasana):
    return db.execute(
        "SELECT * FROM users WHERE name=? AND password=?",

from collections import defaultdict
import time

app = Flask(__name__)
yritykset = defaultdict(list)

def sallitaanko(ip, max_yrityksia=5, ikkuna_sekunteina=60):
    nyt = time.time()
    # Siivoa vanhat yritykset
    yritykset[ip] = [t for t in yritykset[ip] if nyt - t < ikkuna_sekunteina]
    if len(yritykset[ip]) >= max_yrityksia:

    yritykset[ip].append(nyt)
    return True, len(yritykset[ip])

@app.after_request
def tietoturvaheaderit(resp):
    # Estä XSS ja data-injektio
    resp.headers["Content-Security-Policy"] = (
        "default-src 'self'; "
        "script-src 'self'; "
        "style-src 'self' 'unsafe-inline'"

{id:'m3t11',title:'JWT-tokenien haavoittuvuudet',desc:'JWT-haavoittuvuudet: 1) "alg: none" -hyökkäys (ohittaa allekirjoituksen), 2) HS256 vs RS256 confusion, 3) Heikko salaisuus (brute force), 4) Token ei vanhene. Osoita PyJWT-kirjastolla. Korjaa jokainen.',theory:`JWT (JSON Web Token) koostuu kolmesta osasta: header, payload, signature. Haavoittuvuuksia: alg:none ohittaa allekirjoituksen, heikko secret murretaan brute forcella, HS256/RS256 sekaannus.`,example:`import jwt  # pip install PyJWT
import time

SECRET = "todella_vahva_salaisuus_32_merkkia_tai_enemman"

# Luo token
def luo_token(kayttaja_id):
    payload = {
        "sub": kayttaja_id,
        "iat": int(time.time()),
        "exp": int(time.time()) + 3600  # vanhenee tunnissa
    }
    return jwt.encode(payload, SECRET, algorithm="HS256")

# Tarkista token
def tarkista_token(token):
    try:
        payload = jwt.decode(
            token, SECRET,
            algorithms=["HS256"],  # TÄRKEÄÄ: älä salli "none"!
            options={"require": ["exp", "iat", "sub"]}
        )
        return payload
    except jwt.ExpiredSignatureError:
        return None  # vanhentunut
    except jwt.InvalidTokenError:
        return None  # virheellinen

token = luo_token(42)
print(tarkista_token(token))`,diff:'hard'},

{id:'m3t13',title:'Web Application Firewall',desc:'Asenna ModSecurity tai toteuta yksinkertainen WAF Python-proxyna: 1) Tunnista SQL-injektio (säännöllisillä lausekkeilla), 2) XSS-yritykset, 3) Path traversal. Testaa OWASP CRS-säännöillä. Käsittele false positives.',theory:`WAF (Web Application Firewall) analysoi HTTP-liikennettä ja estää tunnetut hyökkäysyritykset. Voidaan toteuttaa säännöllisillä lausekkeilla tai ML-mallilla. False positive on normaalin liikenteen esto.`,example:`import re
from flask import Flask, request, abort

app = Flask(__name__)

# Yksinkertainen WAF
SQLI_PATTERN = re.compile(
    r"(\b(union|select|insert|update|delete|drop|create|alter)\b|'\s*(or|and)\s*'\d|--)",
    re.IGNORECASE
)

XSS_PATTERN = re.compile(
    r"(<script|javascript:|onerror=|onload=|<iframe|<img[^>]+src=)",
    re.IGNORECASE
)

def waf_tarkistus(arvo):
    if SQLI_PATTERN.search(arvo):
        return "SQL-injektioyritys"
    if XSS_PATTERN.search(arvo):
        return "XSS-yritys"
    return None

@app.before_request
def tarkista_pyynto():
    for avain, arvo in request.values.items():
        uhka = waf_tarkistus(arvo)
        if uhka:
            abort(403, f"WAF esto: {uhka}")`,diff:'hard'},

{id:'m4',title:'Kryptografia',subtitle:'Symmetrinen/asymmetrinen salaus, hash, PKI',tag:'Keskitaso',tagClass:'tag-blue',
theory:[
{title:'Symmetrinen salaus',body:`Symmetrisessä salauksessa sama avain salaa ja purkaa. Nopea, sopii suurelle datamäärälle.

<strong>AES (Advanced Encryption Standard):</strong>
Nykypäivän standardi. Avainpituudet: 128, 192 tai 256 bittiä.
Tilat: ECB (älä käytä!), CBC, CTR, GCM (suositellaan)
AES-GCM tarjoaa myös autentikoinnin (AEAD)

<strong>Miksi ECB on vaarallinen:</strong>
Sama selväkielilohko → sama salattu lohko
"ECB Pingviini": kuva salataan ECB:llä, kuvio säilyy!

<strong>Avainten vaihto-ongelma:</strong>
Miten jaetaan avain turvallisesti? → Asymmetrinen salaus ratkaisee

<strong>ChaCha20-Poly1305:</strong>
Moderni vaihtoehto AES:lle, erityisen nopea mobiililaitteilla`},
{title:'Asymmetrinen salaus ja PKI',body:`Asymmetrisessä salauksessa on avainpari: julkinen avain (kaikille) ja yksityinen avain (pidä salassa).

<strong>RSA:</strong>
Perustuu suurten alkulukujen tulontekijöihin. Avainpituus 2048+ bittiä.
Salaa julkisella avaimella → pura yksityisellä
Allekirjoita yksityisellä → varmista julkisella

<strong>ECDSA ja Ed25519:</strong>
Elliptisten käyrien kryptografia. Lyhyemmät avaimet, parempi suorituskyky.
SSH käyttää usein Ed25519:ää

<strong>TLS/HTTPS prosessi:</strong>

{id:'m4t1',title:'AES-salaus Pythonilla',desc:'Toteuta AES-GCM-salaus cryptography-kirjastolla: 1) Generoi avain, 2) Salaa viesti, 3) Pura viesti, 4) Osoita että tampered ciphertext havaitaan (authentication tag). Vertaa AES-CBC:hen (ei autentikointia).',theory:`AES (Advanced Encryption Standard) on symmetrinen salausalgoritmi. GCM (Galois/Counter Mode) lisää autentikoinnin — havaitaan jos salattu data muuttuu. Nonce pitää olla uniikki jokaiselle salaukselle.`,example:`from cryptography.hazmat.primitives.ciphers.aead import AESGCM

solution:`from cryptography.hazmat.primitives.ciphers.aead import AESGCM
import os

# AES-GCM (suositeltu - authenticated encryption)
avain = AESGCM.generate_key(bit_length=256)
aesgcm = AESGCM(avain)

nonce = os.urandom(12)  # 96 bittiä GCM:lle
viesti = b"Salainen viesti tietoturvakurssilla"
lisädata = b"konteksti (ei salata mutta autentikoidaan)"

# Salaus
salattu = aesgcm.encrypt(nonce, viesti, lisädata)
print(f"Salattu: {salattu.hex()}")

# Purku
alkuperäinen = aesgcm.decrypt(nonce, salattu, lisädata)
print(f"Purettu: {alkuperäinen.decode()}")

# Tamper-testi
try:
    muokattu = bytearray(salattu)
    muokattu[5] ^= 0xFF  # muuta yksi bitti
    aesgcm.decrypt(nonce, bytes(muokattu), lisädata)
except Exception as e:

{id:'m4t2',title:'RSA avainpari ja allekirjoitus',desc:'Luo RSA-4096 avainpari. Allekirjoita viesti yksityisellä avaimella. Varmista allekirjoitus julkisella avaimella. Selitä: miksi RSA ei sovi suuren datan salaukseen (nopeusvertailu AES:iin). Hybrid-salaus.',theory:`RSA perustuu suurten alkulukujen tulontekijöiden laskemisen vaikeuteen. Julkisella avaimella salataan, yksityisellä puretaan. RSA on hidas suurelle datalle — käytä hybrid-salausta (RSA+AES).`,example:`from cryptography.hazmat.primitives.asymmetric import rsa, padding

{id:'m4t3',title:'Diffie-Hellman avaintenvaihto',desc:'Toteuta Diffie-Hellman avaistenvaihtoprotokollan simulaatio Pythonilla: Alice ja Bob sopivat yhteisen salaisuuden julkisessa kanavassa. Selitä discrete logarithm -ongelma. Miten MITM voidaan estää?',theory:`Diffie-Hellman mahdollistaa kahden osapuolen sopia yhteinen salaisuus julkisessa kanavassa ilman salaisuuden lähettämistä. Perustuu discrete logarithm -ongelman vaikeuteen.`,example:`# DH simulaatio pienillä luvuilla (tuotannossa käytä kryptografisia kirjastoja!)

p = 23  # alkuluku (oikeasti satoja bittejä)
g = 5   # generaattori

# Alicen yksityinen avain
a = 6  # salainen
A = pow(g, a, p)  # A = g^a mod p = 8 (julkinen)

# Bobin yksityinen avain

B = pow(g, b, p)  # B = g^b mod p = 19 (julkinen)

# Vaihdetaan julkiset avaimet (eavesdropper näkee A ja B)
# Lasketaan yhteinen salaisuus

{id:'m4t4',title:'Salasanojen turvallinen tallennus',desc:'Vertaa salasanojen tallennustapoja: 1) Plaintext (pahoin), 2) MD5 (huono), 3) bcrypt (hyvä), 4) Argon2id (paras). Demonstroi rainbow table -hyökkäys MD5:een. Osoita miten salt estää sen. Toteuta turvallinen rekisteröinti.',theory:`Salasanojen turvallinen tallennus vaatii erityisesti suunnitellun hash-funktion. bcrypt, scrypt ja Argon2id ovat tarkoituksellisen hitaita ja sisältävät suolan automaattisesti.`,example:`import bcrypt
from argon2 import PasswordHasher

# bcrypt
def bcrypt_hash(salasana: str) -> bytes:
    return bcrypt.hashpw(salasana.encode(), bcrypt.gensalt(rounds=12))

def bcrypt_tarkista(salasana: str, hash: bytes) -> bool:
    return bcrypt.checkpw(salasana.encode(), hash)

# Argon2id (suositeltu 2024)
ph = PasswordHasher(
    time_cost=3,      # iteraatioita
    memory_cost=65536, # 64 MB
    parallelism=1
)

def argon2_hash(salasana: str) -> str:
    return ph.hash(salasana)

def argon2_tarkista(hash: str, salasana: str) -> bool:
    try:
        return ph.verify(hash, salasana)
    except:
        return False

# Testi
hash = argon2_hash("käyttäjän_salasana")
print(argon2_tarkista(hash, "käyttäjän_salasana"))  # True
print(argon2_tarkista(hash, "väärä_salasana"))      # False`,diff:'medium',
solution:`import hashlib, bcrypt, os
from argon2 import PasswordHasher
import time

salasana = "käyttäjän_salasana_2024"

# 1. Plaintext - EI KOSKAAN
print(f"Plaintext: {salasana}")

# 2. MD5 - ei salainen
md5 = hashlib.md5(salasana.encode()).hexdigest()
print(f"MD5: {md5}")

# 3. Salted SHA-256 - parempi mutta silti ei riitä
suola = os.urandom(32)
sha256_salted = hashlib.pbkdf2_hmac('sha256', salasana.encode(), suola, 600000)
print(f"PBKDF2-SHA256: {sha256_salted.hex()[:32]}...")

# 4. bcrypt - hidas tarkoituksella
alku = time.perf_counter()
bcrypt_hash = bcrypt.hashpw(salasana.encode(), bcrypt.gensalt(rounds=12))
print(f"bcrypt: {bcrypt_hash[:30]}... ({time.perf_counter()-alku:.3f}s)")
print(f"Tarkistus: {bcrypt.checkpw(salasana.encode(), bcrypt_hash)}")

# 5. Argon2id - nykypäivän standardi
ph = PasswordHasher(time_cost=3, memory_cost=65536, parallelism=1)
alku = time.perf_counter()
argon2_hash = ph.hash(salasana)
print(f"Argon2id: {argon2_hash[:40]}... ({time.perf_counter()-alku:.3f}s)")`},
{id:'m4t5',title:'TLS-sertifikaatin luominen',desc:'Luo oma CA ja allekirjoita sertifikaatti: 1) Root CA avainpari (openssl), 2) Palvelimen CSR, 3) Allekirjoita Root CA:lla, 4) Aseta Flask:iin, 5) Testaa curl:lla. Selitä Certificate Chain.',theory:`PKI (Public Key Infrastructure) on järjestelmä digitaalisten sertifikaattien hallintaan. Root CA allekirjoittaa Intermediate CA:n, joka allekirjoittaa palvelimen sertifikaatin. openssl on tärkein työkalu.`,example:`#!/bin/bash
# Luo oma CA ja palvelinsertifikaatti

# 1. Luo Root CA
openssl genrsa -out root-ca.key 4096
openssl req -new -x509 -days 1826 -key root-ca.key -out root-ca.crt \
    -subj "/CN=Oma Root CA/O=Harjoitus"

# 2. Palvelimen avainpari ja CSR
openssl genrsa -out palvelin.key 2048
openssl req -new -key palvelin.key -out palvelin.csr \
    -subj "/CN=localhost/O=Harjoitus"

# 3. Allekirjoita Root CA:lla
openssl x509 -req -days 365 -in palvelin.csr \
    -CA root-ca.crt -CAkey root-ca.key \
    -CAcreateserial -out palvelin.crt

# 4. Tarkista
openssl verify -CAfile root-ca.crt palvelin.crt
openssl x509 -in palvelin.crt -text -noout | head -20`,diff:'hard'},
{id:'m4t6',title:'Steganografia',desc:'Piilota viesti kuvatiedostoon LSB (Least Significant Bit) -steganografialla Pythonilla (Pillow). Tee: encode(kuva, viesti) ja decode(kuva). Osoita että kuva näyttää identtiseltä silmälle. Laske PSNR.',theory:`Steganografia piilottaa tietoa muun datan sisään. LSB (Least Significant Bit) -menetelmässä jokaisen pikselin viimeinen bitti korvataan viestin bitillä — muutos on ihmissilmälle näkymätön.`,example:`from PIL import Image

def piilota(kuva_polku, viesti, kohde_polku):
    kuva = Image.open(kuva_polku).convert("RGB")
    pikselit = list(kuva.getdata())
    
    bitat = "".join(format(ord(c), "08b") for c in viesti) + "00000000"*3  # lopetusmerkit
    
    uudet = []
    bitti_idx = 0
    for r, g, b in pikselit:
        if bitti_idx < len(bitat):
            r = (r & ~1) | int(bitat[bitti_idx])
            bitti_idx += 1
        uudet.append((r, g, b))
    
    uusi = Image.new("RGB", kuva.size)
    uusi.putdata(uudet)
    uusi.save(kohde_polku)

def pura(kuva_polku):
    kuva = Image.open(kuva_polku)
    bitat = "".join(str(p[0] & 1) for p in kuva.getdata())
    merkit = [chr(int(bitat[i:i+8], 2)) for i in range(0, len(bitat), 8)]
    viesti = ""
    for c in merkit:
        if c == "\x00": break
        viesti += c
    return viesti`,diff:'hard'},
{id:'m4t7',title:'Kryptografinen satunnaislukugeneraattori',desc:'Vertaa: random.random() vs os.urandom() vs secrets. Osoita miksi random ei ole kryptografisesti turvallinen (ennustettavuus). Toteuta noppa Mersenne Twisterin perusteella (ennusta seuraava heitto).',theory:`Kryptografinen satunnaislukugeneraattori (CSPRNG) on turvallinen salauksen käyttöön. Python:n random-moduuli ei ole kryptografisesti turvallinen — käytä secrets tai os.urandom.`,example:`import random

{id:'m4t10',title:'Elliptisten käyrien kryptografia',desc:'ECC perusteoriat: 1) Piste elliptisellä käyrällä, 2) Pisteen kertolasku (skalaari), 3) ECDH avaintenvaihto Pythonilla, 4) ECDSA allekirjoitus. Vertaa RSA-2048 vs ECC-256 avainpituus ja turvallisuustaso.',theory:`ECC (Elliptic Curve Cryptography) perustuu elliptisten käyrien matematiikkaan. Lyhyemmät avaimet tarjoavat saman turvallisuustason kuin pitkät RSA-avaimet: ECC-256 ≈ RSA-3072.`,example:`from cryptography.hazmat.primitives.asymmetric import ec

{id:'m4t11',title:'Kvanttilaskenta ja kryptografia',desc:'Post-quantum cryptography: 1) Miksi RSA ja ECC ovat haavoittuvia kvanttitietokoneelle (Shorin algoritmi), 2) NIST PQC -standardit (CRYSTALS-Kyber, CRYSTALS-Dilithium), 3) Hybrid-lähestymistapa siirtymäkaudella.',theory:`Kvanttitietokoneet uhkaavat RSA:ta ja ECC:tä Shorin algoritmin avulla. Post-quantum kryptografia käyttää matemaattisia ongelmia jotka ovat vaikeita myös kvanttitietokoneille. NIST standardisoi CRYSTALS-Kyber ja Dilithium.`,example:`# Post-quantum kryptografia (teoreettinen esimerkki)

{id:'m4t12',title:'Zero-knowledge proof',desc:'Zero-knowledge proof yksinkertaisesti: 1) Selitä konsepti (todista tietäväsi jotain paljastamatta sitä), 2) Schnorr-protokolla Pythonilla, 3) Käytännön sovellukset (anonyymi kirjautuminen, age proof).',theory:`Zero-Knowledge Proof mahdollistaa todistaa tietävänsä jotain paljastamatta itse tietoa. Esimerkki: todista tietäväsi salasanan ilman sen lähettämistä.`,example:`# Schnorr-protokolla (yksinkertaistettu ZKP)
import random

p = 23   # alkuluku
g = 5    # generaattori

# Prover tietää salaisuuden x
x = 7  # salainen avain
Y = pow(g, x, p)  # julkinen avain Y = g^x mod p

# Protokolla:
# 1. Prover lähettää R = g^r mod p
r = random.randint(1, p-2)
R = pow(g, r, p)

# 2. Verifier lähettää haasteen c
c = random.randint(1, p-2)

# 3. Prover lähettää s = r + c*x mod (p-1)
s = (r + c * x) % (p - 1)

# 4. Verifier tarkistaa: g^s == R * Y^c mod p
vasen = pow(g, s, p)
oikea = (R * pow(Y, c, p)) % p

print(f"ZKP toimii: {vasen == oikea}")
print(f"Prover ei paljastanut x={x}, vain todisti tietävänsä sen")`,diff:'hard'},
{id:'m4t13',title:'Salausprotokollien analyysi',desc:'Analysoi eri salausprotokollien vahvuudet ja heikkoudet: WEP (RC4, heikko IV), WPA2 (AES-CCMP), Signal Protocol (Double Ratchet), TLS 1.3. Miksi jokainen on edeltäjäänsä parempi?',theory:`Salausprotokollien turvallisuushistoria: WEP (RC4, rikki 2001), WPA (TKIP, heikko), WPA2 (AES-CCMP, ok), WPA3 (SAE, paras). TLS versiot: 1.0/1.1 (vanhentunut), 1.2 (ok), 1.3 (paras).`,example:`# TLS-version tarkistus
import ssl
import socket

def tarkista_tls_versiot(host, portti=443):
    # Testaa TLS 1.3 tuki
    for versio, nimi in [
        (ssl.TLSVersion.TLSv1_2, "TLS 1.2"),
        (ssl.TLSVersion.TLSv1_3, "TLS 1.3"),
    ]:
        konteksti = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
        konteksti.minimum_version = versio
        konteksti.maximum_version = versio
        konteksti.check_hostname = False
        konteksti.verify_mode = ssl.CERT_NONE
        
        try:
            with socket.create_connection((host, portti), timeout=5) as sock:
                with konteksti.wrap_socket(sock) as ssock:
                    print(f"{nimi}: TUETTU (käytetään: {ssock.version()})")
        except Exception as e:
            print(f"{nimi}: EI TUETTU")

tarkista_tls_versiot("google.com")`,diff:'medium'},
{id:'m4t14',title:'Kryptografinen API-suunnittelu',desc:'Suunnittele kryptografinen kirjasto Pythonissa: encrypt(data, password), decrypt(data, password), sign(data, private_key), verify(data, signature, public_key). Käytä cryptography-kirjastoa. Dokumentoi turvallisuuspäätökset.',theory:`Turvallinen kryptografinen API suunnitellaan niin että sen väärin käyttäminen on vaikeaa. Käytä AEAD (Authenticated Encryption with Associated Data) jotta salaus ja autentikointi ovat yhdessä.`,example:`import os
from cryptography.hazmat.primitives.ciphers.aead import AESGCM
from cryptography.hazmat.primitives.kdf.pbkdf2 import PBKDF2HMAC
from cryptography.hazmat.primitives import hashes
import base64

class TurvallinenSalaus:
    def __init__(self, salasana: str):
        # Johda avain salasanasta
        suola = os.urandom(16)
        kdf = PBKDF2HMAC(algorithm=hashes.SHA256(), length=32, salt=suola, iterations=600000)
        avain = kdf.derive(salasana.encode())
        self._gcm = AESGCM(avain)
        self._suola = suola
    
    def salaa(self, data: bytes) -> bytes:
        nonce = os.urandom(12)  # Uniikki joka kerralla!
        salattu = self._gcm.encrypt(nonce, data, None)
        return self._suola + nonce + salattu
    
    def pura(self, data: bytes) -> bytes:
        suola, nonce, salattu = data[:16], data[16:28], data[28:]
        return self._gcm.decrypt(nonce, salattu, None)

s = TurvallinenSalaus("käyttäjän_salasana")
sal = s.salaa(b"Salainen viesti")
print(s.pura(sal))`,diff:'hard'},
{id:'m4t15',title:'Blockchain perusteknologia',desc:'Rakenna yksinkertainen blockchain Pythonilla: Block (index, timestamp, data, previous_hash, hash), calculate_hash (SHA-256), validate_chain. Lisää proof-of-work. Osoita miten ketjua ei voi muuttaa jälkikäteen.',theory:`Blockchain on hajautettu tietokanta jonka tietueet (lohkot) on ketjutettu kryptografisesti. Jokainen lohko sisältää edellisen lohkon hashin — ketjun muuttaminen vaatii kaikkien lohkojen uudelleenlaskennan.`,example:`import hashlib, json, time

class Lohko:
    def __init__(self, index, data, edellinen_hash):
        self.index = index
        self.aikaleima = time.time()
        self.data = data
        self.edellinen_hash = edellinen_hash
        self.nonce = 0
        self.hash = self.laske_hash()
    
    def laske_hash(self):
        sisalto = json.dumps({
            "index": self.index, "data": self.data,
            "edellinen_hash": self.edellinen_hash, "nonce": self.nonce
        }, sort_keys=True)
        return hashlib.sha256(sisalto.encode()).hexdigest()
    
    def loui(self, vaikeus=4):
        while not self.hash.startswith("0" * vaikeus):
            self.nonce += 1
            self.hash = self.laske_hash()

ketju = [Lohko(0, "Genesis", "0")]
uusi = Lohko(1, {"siirtaja": "Alice", "saaja": "Bob", "summa": 10}, ketju[-1].hash)
uusi.loui()
ketju.append(uusi)
print(f"Lohko 1 hash: {ketju[1].hash[:20]}...")`,diff:'hard',
solution:`import hashlib, json, time

class Block:
    def __init__(self, index, data, previous_hash):
        self.index = index
        self.timestamp = time.time()
        self.data = data
        self.previous_hash = previous_hash
        self.nonce = 0
        self.hash = self.calculate_hash()
    
    def calculate_hash(self):
        content = json.dumps({
            "index": self.index,
            "timestamp": self.timestamp,
            "data": self.data,
            "previous_hash": self.previous_hash,
            "nonce": self.nonce
        }, sort_keys=True)
        return hashlib.sha256(content.encode()).hexdigest()
    
    def mine(self, difficulty=4):
        target = "0" * difficulty
        while not self.hash.startswith(target):
            self.nonce += 1
            self.hash = self.calculate_hash()
        print(f"Louhittu! Nonce: {self.nonce}, Hash: {self.hash[:16]}...")

class Blockchain:
    def __init__(self):
        self.chain = [Block(0, "Genesis", "0")]
    
    def add_block(self, data):
        prev = self.chain[-1]
        block = Block(len(self.chain), data, prev.hash)
        block.mine()
        self.chain.append(block)
    
    def is_valid(self):
        for i in range(1, len(self.chain)):
            curr, prev = self.chain[i], self.chain[i-1]
            if curr.hash != curr.calculate_hash(): return False
            if curr.previous_hash != prev.hash: return False
        return True

bc = Blockchain()
bc.add_block({"siirtaja": "Alice", "saaja": "Bob", "summa": 10})
bc.add_block({"siirtaja": "Bob", "saaja": "Charlie", "summa": 5})
print(f"Ketju validi: {bc.is_valid()}")`}
],

{id:'m5',title:'Linux tietoturva & Komentorivi',subtitle:'Shell, oikeudet, prosessit, koventaminen',tag:'Keskitaso',tagClass:'tag-blue',
theory:[
{title:'Linux tietoturva-arkkitehtuuri',body:`Linux on tietoturva-ammattilaisen tärkein työkalu. Perusymmärrys on välttämätöntä.

<strong>Käyttäjät ja oikeudet:</strong>
root (UID 0) = kaikki oikeudet
sudo = suorita yksittäinen komento root-oikeuksilla
su - = vaihda käyttäjäksi (pidä root-tili lukittuna)

<strong>Tiedosto-oikeudet:</strong>
rwxr-xr-- = omistaja, ryhmä, muut
r=4, w=2, x=1 → chmod 755 = rwxr-xr-x

<strong>Erityisoikeudet:</strong>
SUID (4xxx): suorita tiedoston omistajan oikeuksilla
SGID (2xxx): suorita ryhmän oikeuksilla
Sticky (1xxx): vain omistaja voi poistaa (esim. /tmp)

<strong>Prosessit ja signaalit:</strong>
kill -9 PID = pakkolopetus (SIGKILL)
kill -15 PID = kohteliaan pyyntö (SIGTERM)
ps aux = kaikki prosessit
top/htop = reaaliaikainen seuranta`},
{title:'Bash-skriptaus tietoturvatehtäviin',body:`Bash on tietoturva-ammattilaisen välttämätön työkalu.

<strong>Perusrakenteet:</strong>
#!/bin/bash          — shebang
$1, $2, $@          — argumentit
"$muuttuja"         — lainaa aina!
$(komento)          — korvaus
if [ -f tiedosto ]; then ... fi

<strong>Hyödyllisiä komentoja:</strong>
grep -r "haku" /kansio     — rekursiivinen haku
awk '{print $1}' tiedosto  — sarakekäsittely
sed 's/vanha/uusi/g'       — korvaus
sort | uniq -c | sort -rn  — frekvenssianalyysi
netstat -tlnp              — avoimet portit
ss -tlnp                   — moderni versio
find / -perm -4000 2>/dev/null — SUID-tiedostot`}
],
tasks:[
{id:'m5t1',title:'Linux-komennot tietoturvaan',desc:'Opi ja dokumentoi: 1) Tiedostojärjestelmän tarkistus (find, ls -la, stat), 2) Verkkoanalyysi (ss, netstat, ip a, ip route), 3) Prosessien tarkistus (ps, top, lsof), 4) Lokien luku (journalctl, tail -f), 5) Käyttäjätietojen tarkistus.',theory:`Linux-tietoturvakomennot: ss/netstat näyttää verkkoyhteyksiä, ps/top prosesseja, find etsii tiedostoja, grep hakee sisältöä. journalctl on systemd:n lokienhallinta.`,example:`# Tietoturvatarkistukset

# Kuuntelevat portit
ss -tlnp

# Kaikki verkkoyhteydet
ss -tunap

# Prosessit CPU:n mukaan
ps aux --sort=-%cpu | head -10

# Viimeksi muuttuneet tiedostot /etc:ssä
find /etc -mtime -1 -type f 2>/dev/null

# Epäonnistuneet kirjautumiset
journalctl -u ssh --since "1 hour ago" | grep "Failed"

# Käyttäjät joilla on shell
grep -E "/bin/(bash|sh|zsh)" /etc/passwd

# SUID-tiedostot (mahdollinen privesc)
find / -perm -4000 -type f 2>/dev/null`,diff:'easy'},
{id:'m5t2',title:'Bash-skripti: järjestelmätietoturvaraportti',desc:'Kirjoita Bash-skripti joka generoi tietoturvaraportin: käyttäjätilit (ilman salasanaa!), SUID-tiedostot, avoimet portit, cron-jobbit, äskettäin muuttuneet tiedostot (/etc, /bin), epäonnistuneet kirjautumiset.',theory:`Bash-skriptit automatisoivat toistuvia tietoturvatarkistuksia. Hyvä skripti tarkistaa: SUID-tiedostot, avoimet portit, epäonnistuneet kirjautumiset, äskettäin muuttuneet tiedostot ja cronjobit.`,example:`#!/bin/bash
set -euo pipefail

echo "=== TIETOTURVARAPORTTI $(date) ==="

echo -e "\n[*] Avoimet portit:"
ss -tlnp 2>/dev/null | grep LISTEN

echo -e "\n[*] SUID-tiedostot:"
find / -perm -4000 -type f 2>/dev/null

echo -e "\n[*] Epäonnistuneet SSH-kirjautumiset:"
grep "Failed password" /var/log/auth.log 2>/dev/null | tail -5

echo -e "\n[*] Cron-jobbit:"
crontab -l 2>/dev/null
ls -la /etc/cron.d/ 2>/dev/null

echo -e "\n[*] Äskettäin muuttuneet tiedostot /etc:ssä:"
find /etc -mtime -1 -type f 2>/dev/null | head -10`,diff:'medium',
solution:`#!/bin/bash
# Järjestelmätietoturvaraportti

RED='\'; YELLOW='\'; NC='\'
warni() { echo -e "\${YELLOW}[!] \$1\${NC}"; }
virhe() { echo -e "\${RED}[✗] \$1\${NC}"; }

echo "=== TIETOTURVARAPORTTI $(date) ==="

# 1. Käyttäjät ilman salasanaa
echo "\\n[*] Käyttäjät ilman salasanaa:"
awk -F: '(\$2 == "" || \$2 == "!") && \$3 >= 1000 {print "  " \$1}' /etc/shadow 2>/dev/null || echo "  (ei pääsyä)"

# 2. SUID-tiedostot
echo "\\n[*] SUID-tiedostot:"
find / -perm -4000 -type f 2>/dev/null | while read f; do
    warni "  \$f"
done

# 3. Avoimet portit
echo "\\n[*] Kuuntelevat portit:"
ss -tlnp 2>/dev/null | grep LISTEN

# 4. Cron-jobbit
echo "\\n[*] Cron-jobbit:"
for user in $(cut -f1 -d: /etc/passwd); do
    crontab -u "\$user" -l 2>/dev/null | grep -v '^#' | while read job; do
        echo "  \$user: \$job"
    done
done

# 5. Äskettäin muuttuneet tiedostot
echo "\\n[*] Muuttuneet tiedostot /etc:ssä (24h):"
find /etc -mtime -1 -type f 2>/dev/null | head -20`},
{id:'m5t3',title:'SSH:n kovennustoimenpiteet',desc:'Konfiguroi SSH mahdollisimman turvalliseksi /etc/ssh/sshd_config:ssa: PermitRootLogin no, PasswordAuthentication no (avainpohjainen), MaxAuthTries 3, AllowUsers, Port vaihtaminen, Fail2ban. Testaa jokainen.',theory:`SSH-kovennustoimenpiteet: poista root-kirjautuminen, käytä vain avainpohjaista autentikointia, rajoita käyttäjiä, vaihda oletusportti, lisää idle timeout.`,example:`# /etc/ssh/sshd_config muutokset

{id:'m5t4',title:'iptables palomuuri',desc:'Konfiguroi iptables-säännöt: 1) Oletuspolitiikka DROP, 2) Salli loopback, 3) Salli vakiintuneet yhteydet (ESTABLISHED,RELATED), 4) Salli SSH/HTTP/HTTPS, 5) Rate limit ICMP, 6) Tallenna säännöt (iptables-save). Testaa hping3:lla.',theory:`iptables suodattaa IP-paketteja. Ketjut: INPUT (saapuvat), OUTPUT (lähtevät), FORWARD (läpikulkevat). Politiikka DROP on oletuksena turvallisempi kuin ACCEPT.`,example:`#!/bin/bash
# Palomuuri alusta

# Tyhjennä kaikki säännöt
iptables -F
iptables -X

# Oletuspolitiikka: hylkää kaikki
iptables -P INPUT DROP
iptables -P FORWARD DROP
iptables -P OUTPUT ACCEPT

# Salli loopback
iptables -A INPUT -i lo -j ACCEPT

# Salli jo aloitetut ja liittyvät yhteydet
iptables -A INPUT -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT

# SSH - rajoita yrityksiä
iptables -A INPUT -p tcp --dport 22 -m recent --name SSH --update --seconds 60 --hitcount 4 -j DROP
iptables -A INPUT -p tcp --dport 22 -m recent --name SSH --set -j ACCEPT

# HTTP/HTTPS
iptables -A INPUT -p tcp -m multiport --dports 80,443 -j ACCEPT

# Tallenna
iptables-save > /etc/iptables/rules.v4`,diff:'hard'},
{id:'m5t5',title:'Linux Privilege Escalation',desc:'Harjoittele privesc omassa VM:ssä (TARKOITUKSELLA haavoittuva kone: VulnHub). Kokeile: 1) SUID-tiedostojen hyödyntäminen (GTFOBins), 2) Sudo-konfiguraatiovirhe, 3) Cron job -kirjoitusoikeus, 4) PATH hijacking.',theory:`Linux Privilege Escalation (privesc): hyökkääjä nousee tavalliselta käyttäjältä root-oikeuksiin. Vektoreita: SUID-tiedostot (GTFOBins), sudo-konfiguraatiovirheet, kirjoitettavat cron-jobit, PATH hijacking.`,example:`# Privilege Escalation tarkistukset (omalla koneella!)

{id:'m5t6',title:'Auditd ja SELinux/AppArmor',desc:'Konfiguroi Linux-auditd: seuraa tiedostokäsittelyä (/etc/passwd, /etc/shadow), komentoja (execve), verkkoyhteyksiä. Analysoi lokit ausearch:lla. Lisäksi: AppArmor-profiilin luominen yksinkertaiselle ohjelmalle.',theory:`Auditd kirjaa järjestelmätapahtumat kuten tiedostokäytöt, komennot ja verkkoyhteydet. SELinux/AppArmor pakottavat Mandatory Access Control -politiikkoja.`,example:`# Auditd-säännöt (lisää /etc/audit/rules.d/audit.rules)

{id:'m5t7',title:'Chroot ja kontit eristämiseen',desc:'Tee chroot-ympäristö (jail) Flask-sovellukselle. Vertaa Docker-konttiin. Selitä mitä chroot suojaa ja mistä se ei suojaa (ns, cgroups puuttuvat). Toteuta yksinkertainen container käsin (Linux namespaces).',theory:`Chroot luo eristetyn ympäristön jossa prosessi luulee hakemiston olevan juurensa. Se suojaa tiedostojärjestelmäpääsyä mutta ei verkkoa tai prosesseja. Docker käyttää Linux namespaceja täydellisempään eristykseen.`,example:`#!/bin/bash

{id:'m5t8',title:'Kriptologit Linuxissa',desc:'Luo salattu tiedostojärjestelmä: 1) LUKS-salaus (cryptsetup), 2) VeraCrypt-kontti, 3) GPG-salattu kansio. Automatisoi avaaminen ja sulkeminen skriptillä. Selitä deniable encryption.',theory:`LUKS (Linux Unified Key Setup) on Linux:n täyden levyn salausjärjestelmä. VeraCrypt on monialustainen salaustyökalu. GPG salaa yksittäiset tiedostot.`,example:`#!/bin/bash

{id:'m5t9',title:'Rootkit-havaitseminen',desc:'Asenna rkhunter ja chkrootkit. Aja skannaukset. Analysoi tulokset (false positivet yleisiä). Selitä miten rootkit piilottaa itsensä (LD_PRELOAD, kernel module). Tutki /proc-tiedostojärjestelmä.',theory:`Rootkit piilottaa itsensä järjestelmältä muokkaamalla ytimen toimintoja tai käyttöjärjestelmän kirjastoja. rkhunter ja chkrootkit vertaavat järjestelmätiedostoja tunnettuihin hyviin arvoihin.`,example:`#!/bin/bash

{id:'m5t11',title:'systemd-tietoturva',desc:'Konfiguroi systemd-palvelu turvalliseksi: PrivateTmp, ProtectSystem, ProtectHome, NoNewPrivileges, CapabilityBoundingSet, ReadOnlyPaths. Testaa systemd-analyze security.',theory:`systemd tukee palveluiden tietoturvakonfiguraatiota suoraan unit-tiedostoissa. PrivateTmp, ProtectSystem, NoNewPrivileges ja muut direktiivit rajoittavat palvelun pääsyä järjestelmäresursseihin.`,example:`# /etc/systemd/system/oma-palvelu.service

{id:'m5t12',title:'PAM (Pluggable Auth Modules)',desc:'Konfiguroi PAM Linux-kirjautumiseen: 1) Salasanakompleksisuus (pam_pwquality), 2) Account lockout (pam_tally2), 3) 2FA (Google Authenticator + pam_google_authenticator), 4) Suurin käyttäjäistuntojen määrä.',theory:`PAM (Pluggable Authentication Modules) on Linux:n autentikaatiokerros. pam_pwquality pakottaa salasanasäännöt, pam_tally2/pam_faillock lukitsee tilit liian monien yritysten jälkeen.`,example:`# /etc/pam.d/common-password - salasanasäännöt

{id:'m5t13',title:'Verkkosniffaus Linuxissa',desc:'tcpdump-komentosarja tietoturvaseurantaan: 1) Kaappaa vain tiettyjä protokollia, 2) Tallenna PCAP-tiedostoon, 3) Parsii Python-skriptillä (scapy), 4) Hälytä epäilyttävistä kuvioista (port scan, ARP flood).',theory:`tcpdump on komentorivin Wireshark. Se kaappaa paketteja suodattimien perusteella ja tallentaa PCAP-tiedostoon. Scapy mahdollistaa ohjelmallisen pakettianalyysin.`,example:`#!/bin/bash
# tcpdump-skriptit

# Kaappaa HTTP-liikennettä
tcpdump -i eth0 -w /tmp/http.pcap port 80

# Kaappaa tietylle IP:lle
tcpdump -i any host 192.168.1.100

# Analysoi tallennettua
tcpdump -r /tmp/http.pcap -A | grep -i "password\|user\|login"

# Python: Scapy analyysi
from scapy.all import sniff, IP, TCP

def havaitse_portscan(paketti):
    if paketti.haslayer(TCP):
        if paketti[TCP].flags == 2:  # SYN
            src = paketti[IP].src
            # Laske SYN-paketit per IP
            print(f"SYN: {src} -> {paketti[TCP].dport}")

# sniff(filter="tcp", prn=havaitse_portscan, timeout=60)`,diff:'medium'},
{id:'m5t14',title:'File integrity monitoring',desc:'Toteuta tiedostoeheyden seuranta: laske kaikki /etc ja /bin hashit, tallenna JSON:iin, aja cron-jobbina joka tunti, hälytä muutoksista sähköpostilla (sendmail tai SMTP). AIDE:n vertailu.',theory:`File Integrity Monitoring (FIM) havaitsee luvattomat muutokset kriittisiin tiedostoihin. AIDE (Advanced Intrusion Detection Environment) on Linux-standardityökalu FIM:iin.`,example:`import hashlib, json, smtplib
from pathlib import Path
from email.message import EmailMessage

def laske_hash(polku):
    h = hashlib.sha256()
    with open(polku, "rb") as f:
        for b in iter(lambda: f.read(65536), b""):
            h.update(b)
    return h.hexdigest()

def paivita_baseline(polut, tiedosto="fim_baseline.json"):
    baseline = {str(p): laske_hash(p) for p in polut if Path(p).exists()}
    json.dump(baseline, open(tiedosto, "w"), indent=2)
    print(f"Baseline: {len(baseline)} tiedostoa")

def tarkista(tiedosto="fim_baseline.json"):
    baseline = json.load(open(tiedosto))

{id:'m5t15',title:'Linux hardening CIS Benchmark',desc:'Lataa CIS Linux Benchmark PDF. Käy läpi Level 1 -kovennustoimenpiteet: filesystem partitioning, mounting options, software updates, logging, network parameters. Kirjoita skripti joka tarkistaa ja korjaa automaattisesti.',theory:`CIS (Center for Internet Security) Benchmarks ovat teollisuusstandardeja täyttäviä kovennusohjeita eri järjestelmille. Level 1 on peruskovennukset jotka eivät vaikuta toiminnallisuuteen.`,example:`#!/bin/bash

# 3.1.1 Pakettien forwarding pois

{id:'m6t1',title:'Phishing-kampanjan tunnistaminen',desc:'Analysoi 5 phishing-sähköpostia (esimerkkejä esim. phishtank.com tai itse luotuja). Tunnista: 1) Lähettäjä (domain spoofattu?), 2) Linkit (hover = näytä oikea URL), 3) Kiireellisyys/uhkailu, 4) Kirjoitusvirheet, 5) Pyydettävät tiedot.',theory:`Phishing-sähköpostit tunnistaa: lähettäjän domain on lähellä oikeaa mutta ei sama (pay-pal.com vs paypal.com), linkit ohjaavat väärään osoitteeseen, viesti luo kiirettä tai pelkoa.`,example:`# Phishing-analyysi Python:lla
import email

from urllib.parse import urlparse

def analysoi_sahkoposti(raakateksti):
    viesti = email.message_from_string(raakateksti)

    kuva = Image.open(kuva_polku)

{id:'m6t10',title:'Domain Spoofing analyysi',desc:'Analysoi domain spoofing -tekniikat: 1) Homoglyyfit (paypaI.com - iso i), 2) Bitflip (paypa1.com), 3) Subdomain trickery (paypal.evil.com), 4) IDN spoofing (Unicode). Kirjoita Python-tarkistin.',theory:`Domain spoofing käyttää visuaalisesti samankaltaisia domaineja: homoglyfit (paypaI.com - iso I vs l), bittimuutokset (paypa1.com), subdomaintemppu (paypal.evil.com).`,example:`import re
from difflib import SequenceMatcher

OIKEAT_DOMAINIT = ["paypal.com", "google.com", "microsoft.com", "amazon.com"]

def tarkista_domain_spoof(epailyttava):
    varoitukset = []
    
    for oikea in OIKEAT_DOMAINIT:
        # Samankaltaisuus
        suhde = SequenceMatcher(None, epailyttava.lower(), oikea.lower()).ratio()
        if 0.8 < suhde < 1.0:
            varoitukset.append(f"Muistuttaa {oikea}:ta (samankaltaisuus {suhde:.0%})")
    
    # Homoglyfit
    HOMOGLYFIT = {"0": "o", "1": "l", "3": "e", "4": "a", "5": "s"}
    normalisoitu = epailyttava.lower()
    for numero, kirjain in HOMOGLYFIT.items():
        normalisoitu = normalisoitu.replace(numero, kirjain)
    if normalisoitu in [d.replace(".com", "") for d in OIKEAT_DOMAINIT]:
        varoitukset.append(f"Homoglyfi-hyökkäys! {epailyttava} -> {normalisoitu}")
    
    return varoitukset

print(tarkista_domain_spoof("pay-pal.com"))
print(tarkista_domain_spoof("paypa1.com"))
print(tarkista_domain_spoof("g00gle.com"))`,diff:'medium'},

{id:'m7',title:'Tietokannat ja ohjelmointi',subtitle:'SQL, NoSQL, turvallinen koodaus, SAST/DAST',tag:'Edistynyt',tagClass:'tag-amber',
theory:[
{title:'Turvallinen SQL-ohjelmointi',body:`Tietokannat tallentavat sovelluksen arvokkaimman datan. SQL-injektio on yksi yleisimmistä ja tuhoisimmista haavoittuvuuksista.

<strong>Parametrisoidut kyselyt (Prepared Statements)</strong> ovat ainoa oikea ratkaisu. Ne erottavat SQL-koodin ja datan toisistaan:

Python: cursor.execute("SELECT * FROM users WHERE name = %s", (name,))
Java: PreparedStatement ps = conn.prepareStatement("SELECT * FROM users WHERE id = ?"); ps.setInt(1, userId);

<strong>ORM (Object-Relational Mapping)</strong>: SQLAlchemy, Django ORM, Hibernate käyttävät automaattisesti parametrisoituja kyselyitä. Mutta varo raw query -metodeja!

<strong>Least Privilege -periaate tietokannassa:</strong> Sovelluksen tietokantakäyttäjällä pitää olla vain tarvittavat oikeudet. Web-sovellus tarvitsee SELECT/INSERT/UPDATE/DELETE – ei DROP, ei CREATE, ei GRANT.

<strong>Tietojen salaus:</strong> Arkaluonteiset kentät (SSN, luottokorttinumerot) salataan tietokannassa. Transparent Data Encryption (TDE) salaa koko tietokannan.`},
{title:'Turvallinen koodaaminen (Secure Coding)',body:`<strong>Input Validation:</strong> Kaikki käyttäjän syötteet ovat pahoja kunnes toisin todistetaan. Whitelist (sallitut arvot) on parempi kuin blacklist.

<strong>Output Encoding:</strong> Enkoodaa data ennen näyttämistä. HTML-enkoodaus (&lt; &gt; &amp; &quot;) XSS:n estämiseksi.

<strong>Error Handling:</strong> Älä näytä stack trace:ja käyttäjälle – ne paljastavat teknologiapinon.

<strong>Secrets Management:</strong> Älä koskaan tallenna salasanoja tai API-avaimia koodiin tai versiohallintaan.

<strong>Dependency Management:</strong> Päivitä riippuvuudet säännöllisesti. npm audit, pip-audit, Snyk, Dependabot.

<strong>SAST vs DAST:</strong> Static Application Security Testing analysoi lähdekoodin. Dynamic Application Security Testing testaa ajavan sovelluksen.`}
],

{id:'m7t1',title:'Haavoittuvan SQL-koodin korjaaminen',desc:'Sinulle annetaan 5 haavoittuvaista Python/SQL-koodinpätkää. Tunnista jokaisen haavoittuvuus ja kirjoita turvallinen versio käyttäen parametrisoituja kyselyitä.',theory:`SQL-injektio syntyy kun käyttäjän syöte liitetään SQL-kyselyyn ilman suojausta. Parametrisoidut kyselyt (prepared statements) erottavat koodin datasta — ainoa oikea ratkaisu.`,example:`import sqlite3

# HAAVOITTUVA
def haavoittuva(db, nimi):
    # EI KOSKAAN NÄIN!
    return db.execute(f"SELECT * FROM users WHERE name='{nimi}'").fetchall()
    # nimi = "admin' OR 1=1--" -> palauttaa kaikki!

# TURVALLINEN
def turvallinen(db, nimi):
    return db.execute("SELECT * FROM users WHERE name=?", (nimi,)).fetchall()

# HAAVOITTUVA - ORDER BY
def jarjesta_vaara(db, sarake):
    return db.execute(f"SELECT * FROM users ORDER BY {sarake}").fetchall()
    # sarake = "name; DROP TABLE users--" -> KATASTROFI!

# TURVALLINEN - ORDER BY whitelist
def jarjesta_turvallinen(db, sarake):
    SALLITUT = ["name", "email", "created_at"]
    if sarake not in SALLITUT:
        raise ValueError(f"Sarake {sarake!r} ei sallittu")
    return db.execute(f"SELECT * FROM users ORDER BY {sarake}").fetchall()`,diff:'easy',
solution:`import sqlite3

{id:'m7t2',title:'SQLite tietokanta alusta',desc:'Rakenna täydellinen käyttäjähallintajärjestelmä: rekisteröinti (bcrypt), kirjautuminen, profiili, vaihda salasana. Kaikki SQL parametrisoituna. Audit log kirjautumisyrityksistä.',theory:`SQLite on tiedostopohjainen tietokanta joka ei vaadi erillistä palvelinta. Sopii pieniin ja keskikokoisiin sovelluksiin. Python:n sqlite3-moduuli on sisäänrakennettu.`,example:`import sqlite3
import bcrypt

def alusta_db():
    db = sqlite3.connect("users.db")
    db.row_factory = sqlite3.Row  # tulokset dict-tyyppisinä
    db.execute("""
        CREATE TABLE IF NOT EXISTS users (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            username TEXT UNIQUE NOT NULL,
            password_hash TEXT NOT NULL,
            created_at DATETIME DEFAULT CURRENT_TIMESTAMP
        )
    """)
    db.commit()
    return db

def rekisteroidy(db, kayttajanimi, salasana):
    hash_arvo = bcrypt.hashpw(salasana.encode(), bcrypt.gensalt()).decode()
    db.execute("INSERT INTO users (username, password_hash) VALUES (?, ?)",
               (kayttajanimi, hash_arvo))
    db.commit()

def kirjaudu(db, kayttajanimi, salasana):
    rivi = db.execute("SELECT * FROM users WHERE username=?", (kayttajanimi,)).fetchone()
    if rivi and bcrypt.checkpw(salasana.encode(), rivi["password_hash"].encode()):
        return dict(rivi)
    return None`,diff:'medium'},

{id:'m7t5',title:'Timing attack salasanojen vertailussa',desc:'Osoita timing attack: mittaa aikaa kun vertaataan salasanaa oikeaan/väärään. Näytä miten hmac.compare_digest estää tämän. Mittaa ero microsekunteina.',theory:`Timing attack hyödyntää aikaeroja operaatioissa paljastamaan salaisia tietoja. Salasanavertailussa early-exit paljastaa kuinka monta merkkiä on oikein. hmac.compare_digest tekee vakioaikaisen vertailun.`,example:`import hmac
import time
import statistics

def haavoittuva_vertailu(syote, oikea):
    """Early exit: pysähtyy heti ensimmäiseen eroon"""
    return syote == oikea  # Python voi optimoida tämän

def turvallinen_vertailu(syote, oikea):
    """Vakioaikainen: aina sama kesto riippumatta tuloksesta"""
    return hmac.compare_digest(syote.encode(), oikea.encode())

# Mittaa aikaero
oikea = "oikea_salasana_pitkä"

def mittaa(fn, syote, toistot=10000):
    ajat = []
    for _ in range(toistot):
        alku = time.perf_counter_ns()
        fn(syote, oikea)
        ajat.append(time.perf_counter_ns() - alku)
    return statistics.mean(ajat)

t1 = mittaa(haavoittuva_vertailu, "x")  # täysin väärä
t2 = mittaa(haavoittuva_vertailu, oikea[:-1])  # lähes oikea
print(f"Haavoittuva ero: {abs(t2-t1):.1f}ns (hyökkääjä näkee tämän!)")

t3 = mittaa(turvallinen_vertailu, "x")
t4 = mittaa(turvallinen_vertailu, oikea[:-1])
print(f"Turvallinen ero: {abs(t4-t3):.1f}ns (lähes 0)")`,diff:'hard',
solution:`import time, hmac, hashlib, statistics

def haavoittuva_vertailu(syote, oikea):
    """Early exit mahdollistaa timing attackin"""
    return syote == oikea

def turvallinen_vertailu(syote, oikea):
    """Vakioaikainen vertailu"""
    return hmac.compare_digest(syote.encode(), oikea.encode())

def mittaa_aika(funktio, syote, oikea, toistot=10000):
    ajat = []
    for _ in range(toistot):
        alku = time.perf_counter_ns()
        funktio(syote, oikea)
        ajat.append(time.perf_counter_ns() - alku)
    return statistics.mean(ajat)

oikea = "oikea_salasana"

print("=== Haavoittuva vertailu ===")
t1 = mittaa_aika(haavoittuva_vertailu, "x", oikea)
t2 = mittaa_aika(haavoittuva_vertailu, oikea[:-1], oikea)  # lähes oikea
print(f"Väärä alusta: {t1:.1f}ns, Lähes oikea: {t2:.1f}ns, Ero: {t2-t1:.1f}ns")

print("\\n=== Turvallinen vertailu ===")
t3 = mittaa_aika(turvallinen_vertailu, "x", oikea)
t4 = mittaa_aika(turvallinen_vertailu, oikea[:-1], oikea)
print(f"Väärä: {t3:.1f}ns, Lähes oikea: {t4:.1f}ns, Ero: {t4-t3:.1f}ns (lähes 0)")`},
