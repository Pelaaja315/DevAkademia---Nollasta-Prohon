      html += `<button class="nav-item${isActive?' active':''}" onclick="showSecModule('${m.id}')">${m.title} ${badge}</button>`;
    });
  }

  // Ohjelmointiradat
  PROG_TRACKS.forEach(track => {
    html += `<div class="nav-section">// ${track.title.toUpperCase()}</div>`;
    html += `<button class="nav-item${curTrack===track.id && !curMod?' active':''}" onclick="showProgTrack('${track.id}')">${track.icon} ${track.title}</button>`;
    // Näytä moduulit jos tämä rata on aktiivinen
    if(curTrack === track.id){
      track.modules.forEach(m => {
        const tasks = m.tasks||[];
        const done = tasks.filter(t => state[t.id]).length;
        const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
        const isActive = curMod === m.id;
        let badge = '';
        if(done===tasks.length && tasks.length) badge = `<span class="nav-done"></span>`;
        else if(done>0) badge = `<span class="nav-partial">${pct}%</span>`;
        html += `<button class="nav-item${isActive?' active':''}" style="padding-left:32px;font-size:12px" onclick="showProgModule('${track.id}','${m.id}')">${m.title.substring(0,24)} ${badge}</button>`;
      });
    }
  });

  nav.innerHTML = html;
}

// ============================================================
// TILASTOT
// ============================================================
function updateStats(){
  const total = countTasks();
  const done = countDone();
  const pct = total ? Math.round(done/total*100) : 0;

  // Moduulien määrä
  let mods = 0;
  if(typeof MODULES !== 'undefined') mods += MODULES.length;
  PROG_TRACKS.forEach(t => mods += t.modules.length);

  // Valmiit moduulit
  let valmiit = 0;
  if(typeof MODULES !== 'undefined'){
    MODULES.forEach(m => {
      const tasks = m.tasks||[];
      if(tasks.length && tasks.every(t => state[t.id])) valmiit++;
    });
  }
  PROG_TRACKS.forEach(track => {
    track.modules.forEach(m => {
      const tasks = m.tasks||[];
      if(tasks.length && tasks.every(t => state[t.id])) valmiit++;
    });
  });

  document.getElementById('s-done').textContent = done;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-mods').textContent = mods;
  document.getElementById('s-comp').textContent = valmiit;
  document.getElementById('pbar').style.width = pct+'%';
  document.getElementById('pct-lbl').textContent = pct+'%';
}

// ============================================================
// TEORIA-FORMATOINTI
// ============================================================
function formatTheory(teoria){
  if(!teoria) return '';
  if(Array.isArray(teoria)){
    return teoria.map(s => `<div class="sec-title" style="font-size:15px">${esc(s.title)}</div>${formatTheoryText(s.body)}`).join('<div class="divider"></div>');
  }
  return formatTheoryText(teoria);
}

function formatTheoryText(teksti){
  if(!teksti) return '';
  // Koodinpätkät taktikeillä
  let html = esc(teksti);
  // Muunna rivinvaihdot
  html = html.replace(/\n\n/g,'</p><p class="theory-p">');
  html = html.replace(/\n/g,'<br>');
  html = '<p class="theory-p">' + html + '</p>';
  // Lihavointi
  html = html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  html = html.replace(/&lt;strong&gt;(.+?)&lt;\/strong&gt;/g,'<strong>$1</strong>');
  return html;
}

// ============================================================
// ETUSIVU
// ============================================================
function showHome(){
  curTrack = null; curMod = null;
  buildNav();

  const total = countTasks();
  const done = countDone();

  // Laske per-track tilastot
  let secDone=0, secTotal=0;
  if(typeof MODULES !== 'undefined'){
    MODULES.forEach(m => {
      const tasks = m.tasks||[];
      secTotal += tasks.length;
      secDone += tasks.filter(t => state[t.id]).length;
    });
  }

  let trackHtml = '';

  // Tietoturvakortti
  if(typeof MODULES !== 'undefined'){
    const pct = secTotal ? Math.round(secDone/secTotal*100) : 0;
    const pctClass = pct===100?'pct-done':pct>0?'pct-partial':'pct-none';
    trackHtml += `
    <div class="track-card" onclick="showSecOverview()">
      <div class="track-icon">🔒</div>
      <span class="tag tag-red">Tietoturva</span>
      <h3>Tietoturva & Hakkerointi</h3>
      <p>Tietoturvan perusteet, verkkoturvallisuus, kryptografia, forensiikka ja paljon muuta.</p>
      <div class="track-footer">
        <span class="track-count">${secTotal} tehtävää • ${MODULES.length} moduulia</span>
        <span class="${pctClass}">${pct}%</span>
      </div>
    </div>`;
  }

  // Ohjelmointiradat
  PROG_TRACKS.forEach(track => {
    let trackTotal=0, trackDone=0;
    track.modules.forEach(m => {
      const tasks = m.tasks||[];
      trackTotal += tasks.length;
      trackDone += tasks.filter(t => state[t.id]).length;
    });
    const pct = trackTotal ? Math.round(trackDone/trackTotal*100) : 0;
    const pctClass = pct===100?'pct-done':pct>0?'pct-partial':'pct-none';
    trackHtml += `
    <div class="track-card" onclick="showProgTrack('${track.id}')">
      <div class="track-icon">${track.icon}</div>
      <span class="tag ${track.tagClass}">${track.tag}</span>
      <h3>${track.title}</h3>
      <p>${track.desc}</p>
      <div class="track-footer">
        <span class="track-count">${trackTotal} tehtävää • ${track.modules.length} moduulia</span>
        <span class="${pctClass}">${pct}%</span>
      </div>
    </div>`;
  });

  document.getElementById('app').innerHTML = `
  <div class="home fade">
    <div class="page-title">DevAkademia</div>
    <div class="page-sub">Nollasta prohon — ${total} tehtävää tietoturvasta, Pythonista, JavaScriptistä ja HTML/CSS:stä. ${done} tehty.</div>
    <div class="track-grid">${trackHtml}</div>
  </div>`;
}

// ============================================================
// TIETOTURVA
// ============================================================

  buildNav();

  const cards = MODULES.map(m => {
    const tasks = m.tasks||[];
    const done = tasks.filter(t => state[t.id]).length;
    const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
    const pctClass = pct===100?'pct-done':pct>0?'pct-partial':'pct-none';
    return `
    <div class="mod-card" onclick="showSecModule('${m.id}')">
      <span class="tag ${m.tagClass}">${m.tag}</span>
      <h4>${esc(m.title)}</h4>
      <p>${esc(m.subtitle||'')}</p>
      <div class="mod-card-footer">
        <span class="track-count">${tasks.length} tehtävää</span>
        <span class="${pctClass}">${pct}%</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
  <div class="mod-page fade">
    <div class="mod-header">
      <button class="breadcrumb" onclick="showHome()">← Etusivu</button>
      <div class="mod-title">🔒 Tietoturva & Hakkerointi</div>
      <div class="mod-sub">Eettinen hakkerointi, verkkoturva, kryptografia, forensiikka</div>
    </div>

function showSecModule(modId){
  curTrack = 'sec'; curMod = modId;
  const mod = MODULES.find(m => m.id === modId);
  if(!mod) return;
  buildNav();

  const teoriaHtml = formatTheory(mod.theory);
  const tehtävätHtml = (mod.tasks||[]).map(task => taskItemHtml(task, 'sec', modId)).join('');
  const quizHtml = buildQuiz(mod.quiz||[], modId);

  document.getElementById('app').innerHTML = `
  <div class="tasks-page fade">
    <div class="tasks-header">
      <button class="breadcrumb" onclick="showSecOverview()">← Tietoturva</button>
      <div class="mod-title">${esc(mod.title)}</div>
      <div class="mod-sub">${esc(mod.subtitle||'')}</div>
    </div>
    ${teoriaHtml ? `<div class="sec-title">Teoria</div>${teoriaHtml}<div class="divider"></div>` : ''}
    <div class="sec-title">Tehtävät (${(mod.tasks||[]).length})</div>

}

// ============================================================
// OHJELMOINTI
// ============================================================

  buildNav();

  const cards = track.modules.map(m => {

    const done = tasks.filter(t => state[t.id]).length;
    const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
    const pctClass = pct===100?'pct-done':pct>0?'pct-partial':'pct-none';

    <div class="mod-card" onclick="showProgModule('${trackId}','${m.id}')">
      <span class="tag tag-blue">Moduuli</span>
      <h4>${esc(m.title)}</h4>
      <p>${esc(m.desc||'')}</p>
      <div class="mod-card-footer">
        <span class="track-count">${tasks.length} tehtävää</span>

  <div class="mod-page fade">
    <div class="mod-header">
      <button class="breadcrumb" onclick="showHome()">← Etusivu</button>
      <div class="mod-title">${track.icon} ${track.title}</div>
      <div class="mod-sub">${esc(track.desc||'')}</div>
    </div>

function showProgModule(trackId, modId){
  curTrack = trackId; curMod = modId;
  const track = PROG_TRACKS.find(t => t.id === trackId);
  if(!track) return;
  const mod = track.modules.find(m => m.id === modId);
  if(!mod) return;
  buildNav();

  const teoriaHtml = mod.theory ? `
    <div class="sec-title">Teoria</div>
    ${formatTheory(mod.theory)}
    ${mod.example ? `<div class="sec-title" style="font-size:15px;margin-top:20px">Koodiesimerkki</div>${codeHtml(mod.example, track.title)}` : ''}
    <div class="divider"></div>` : '';

  const tehtävätHtml = (mod.tasks||[]).map(task => taskItemHtml(task, 'prog', modId, trackId)).join('');

  document.getElementById('app').innerHTML = `
  <div class="tasks-page fade">
    <div class="tasks-header">
      <button class="breadcrumb" onclick="showProgTrack('${trackId}')">← ${track.title}</button>
      <div class="mod-title">${esc(mod.title)}</div>
      <div class="mod-sub">${esc(mod.desc||'')}</div>
    </div>
    ${teoriaHtml}
    <div class="sec-title">Tehtävät (${(mod.tasks||[]).length})</div>
    ${tehtävätHtml}
  </div>`;
}

// ============================================================
// TEHTÄVÄKORTTI
// ============================================================
function taskItemHtml(task, type, modId, trackId=''){
  const done = !!state[task.id];
  const diffLabel = task.diff==='easy'?'● Helppo':task.diff==='medium'?'●● Medium':'●●● Haastava';
  const trackArg = trackId ? `,'${trackId}'` : '';
  return `
  <div class="task-item${done?' completed':''}" id="ti-${task.id}">
    <div class="task-top">
      <button class="task-cb" onclick="toggleTask('${task.id}','${type}','${modId}'${trackArg})">
        <svg class="chk" width="12" height="10" viewBox="0 0 12 10"><polyline points="1,5 4,9 11,1" stroke="white" stroke-width="2" fill="none"/></svg>
      </button>
      <div class="task-info">
        <div class="task-title">${esc(task.title)}</div>
        <div class="task-desc">${esc((task.desc||'').substring(0,100))}${(task.desc||'').length>100?'...':''}</div>
        <div class="task-meta">
          <span class="diff diff-${task.diff}">${diffLabel}</span>
          <button class="open-btn" onclick="openTask('${task.id}','${type}','${modId}'${trackArg})">Avaa tehtävä →</button>
        </div>
      </div>
    </div>
  </div>`;
}

// ============================================================
// TEHTÄVÄ-MODAL
// ============================================================
function openTask(taskId, type, modId, trackId=''){
  // Etsi tehtävä ja moduuli
  let task = null, mod = null;
  if(type === 'sec'){
    mod = MODULES.find(m => m.id === modId);
    task = (mod?.tasks||[]).find(t => t.id === taskId);
  } else {
    const track = PROG_TRACKS.find(t => t.id === trackId);
    mod = track?.modules.find(m => m.id === modId);
    task = (mod?.tasks||[]).find(t => t.id === taskId);
  }
  if(!task) return;

  curTask = {taskId, type, modId, trackId};
  document.getElementById('m-title').textContent = task.title;
  const diffLabel = task.diff==='easy'?'● Helppo':task.diff==='medium'?'●● Medium':'●●● Haastava';
  document.getElementById('m-diff').innerHTML = `<span class="diff diff-${task.diff}">${diffLabel}</span>`;

  // TAB 0: Tehtäväkohtainen teoria
  let teoriaHtml = '';
  if(task.theory){
    teoriaHtml = `<div class="sec-title" style="font-size:15px">📖 Teoria</div><p class="theory-p">${esc(task.theory)}</p>`;
  } else if(mod?.theory){
    teoriaHtml = `<div class="sec-title" style="font-size:15px">📖 Teoria (moduuli)</div>${formatTheory(mod.theory)}`;
  }
  document.getElementById('tab-0').innerHTML = teoriaHtml || '<p class="theory-p" style="color:var(--text3)">Ei teoriaa saatavilla.</p>';

  // TAB 1: Tehtäväkohtainen esimerkki
  let esiHtml = '';
  if(task.example){
    const lang = trackId==='python'?'Python':trackId==='javascript'?'JavaScript':trackId==='html'?'HTML/CSS':type==='sec'?'Bash/Python':'Koodi';
    esiHtml = `<div class="sec-title" style="font-size:15px">💡 Esimerkki</div>${codeHtml(task.example,lang)}`;
  } else if(mod?.example){
    const lang = trackId==='python'?'Python':trackId==='javascript'?'JavaScript':'HTML/CSS';
    esiHtml = `<div class="sec-title" style="font-size:15px">💡 Moduulin esimerkki</div>${codeHtml(mod.example,lang)}`;
  }
  document.getElementById('tab-1').innerHTML = esiHtml || '<p class="theory-p" style="color:var(--text3)">Ei esimerkkiä saatavilla.</p>';

  // TAB 2: Tehtävä
  document.getElementById('tab-2').innerHTML = `
    <div class="info-box info-amber"><div class="info-title">// TEHTÄVÄ</div><div class="info-body" style="font-size:14px">${esc(task.desc)}</div></div>
    <div class="modal-actions">
      <button class="btn btn-green" onclick="merkitseTehty()">✓ Merkitse tehdyksi</button>
      <button class="btn btn-secondary" onclick="closeModal()">Sulje</button>
    </div>`;

  // TAB 3: Mallivastaus
  if(task.solution){
    const lang = trackId==='python'?'Python':trackId==='javascript'?'JavaScript':trackId==='html'?'HTML/CSS':'Koodi';
    document.getElementById('tab-3').innerHTML = `
      <button class="sol-btn" id="sol-btn-${taskId}" onclick="naytaMallivastaus('${taskId}')">
        🔑 Näytä mallivastaus (yritä ensin itse!)
      </button>
      <div class="sol-box" id="sol-${taskId}">
        <div class="sol-title">// MALLIVASTAUS</div>
        ${codeHtml(task.solution, lang)}
      </div>`;
  } else {
    document.getElementById('tab-3').innerHTML = '<p class="theory-p" style="color:var(--text3)">Mallivastausta ei ole. Tarkista tekemäsi ratkaisu dokumentaatiosta tai Googlesta.</p>';
  }

  // TAB 4: Screenshot
  const savedImg = state['img_'+taskId];
  document.getElementById('tab-4').innerHTML = `
    <p class="theory-p">Lataa kuvakaappaus vastauksestasi:</p>
    <div class="upload-area ${savedImg?'has-image':''}" id="upload-${taskId}" onclick="document.getElementById('file-${taskId}').click()">
      <input type="file" id="file-${taskId}" class="upload-input" accept="image/*" onchange="handleUpload(this,'${taskId}')">
      <div class="upload-icon">📸</div>
      <div class="upload-text">Klikkaa lisätäksesi kuvakaappaus</div>
      <div class="upload-sub">PNG, JPG, GIF — max 5MB</div>
      <img class="preview-img" id="preview-${taskId}" ${savedImg?`src="${savedImg}"`:'alt="Esikatselu"'}>
      <button class="clear-img" onclick="clearImg('${taskId}',event)">Poista kuva</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-green" onclick="merkitseTehty()">✓ Merkitse tehdyksi</button>
      <button class="btn btn-secondary" onclick="closeModal()">Sulje</button>
    </div>`;

  switchTab(2);
  document.getElementById('overlay').classList.remove('hidden');
}

function naytaMallivastaus(taskId){
  const btn = document.getElementById('sol-btn-'+taskId);
  const box = document.getElementById('sol-'+taskId);
  if(btn) btn.style.display = 'none';
  if(box) box.style.display = 'block';
}

// ============================================================
// QUIZ
// ============================================================
function buildQuiz(kysymykset, modId){
  if(!kysymykset || !kysymykset.length) return '';
  const html = kysymykset.map((q, qi) => `
    <div class="quiz-wrap" id="quiz-${modId}-${qi}">
      <div class="quiz-q">${esc(q.q)}</div>
      ${q.opts.map((opt,oi)=>`<button class="quiz-opt" onclick="quizVastaa('${modId}',${qi},${oi},${q.ans},'${esc(q.exp||'')}')">${esc(opt)}</button>`).join('')}
      <div class="quiz-fb" id="qfb-${modId}-${qi}" style="display:none"></div>
    </div>`).join('');
  return `<div class="divider"></div><div class="sec-title">Tietokilpailu</div>${html}`;
}

function quizVastaa(modId, qi, oi, oikea, selitys){
  const wrap = document.getElementById(`quiz-${modId}-${qi}`);
  if(!wrap || quizState[`${modId}-${qi}`]) return;
  quizState[`${modId}-${qi}`] = true;
  const optit = wrap.querySelectorAll('.quiz-opt');
  optit.forEach((btn,i) => {
    btn.disabled = true;
    if(i===oikea) btn.classList.add('correct');
    else if(i===oi) btn.classList.add('wrong');
  });
  const fb = document.getElementById(`qfb-${modId}-${qi}`);
  if(fb){
    fb.style.display = 'block';
    fb.className = `quiz-fb ${oi===oikea?'ok':'fail'}`;
    fb.textContent = oi===oikea ? `✓ Oikein! ${selitys}` : `✗ Väärin. ${selitys}`;
  }
}

// ============================================================
// TALLENNUS JA MERKITSEMINEN
// ============================================================
function merkitseTehty(){
  if(!curTask) return;
  const {taskId, type, modId, trackId} = curTask;
  state[taskId] = true;
  save(state);
  closeModal();
  // Päivitä tehtäväkortti
  const el = document.getElementById('ti-'+taskId);
  if(el) el.classList.add('completed');
  updateStats(); buildNav();
}

function toggleTask(taskId, type, modId, trackId=''){
  state[taskId] = !state[taskId];
  save(state);
  const el = document.getElementById('ti-'+taskId);
  if(el) el.classList.toggle('completed', !!state[taskId]);
  updateStats(); buildNav();
}

function handleUpload(input, taskId){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 5*1024*1024){ alert('Kuva on liian suuri (max 5MB)'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    state['img_'+taskId] = dataUrl;
    save(state);
    const area = document.getElementById('upload-'+taskId);
    const preview = document.getElementById('preview-'+taskId);
    if(area && preview){
      preview.src = dataUrl;
      area.classList.add('has-image');
    }
  };
  reader.readAsDataURL(file);
}

function clearImg(taskId, e){
  e.stopPropagation();
  delete state['img_'+taskId];
  save(state);
  const area = document.getElementById('upload-'+taskId);
  const preview = document.getElementById('preview-'+taskId);
  if(area && preview){ preview.src=''; area.classList.remove('has-image'); }
}

// ============================================================
// MODAL
// ============================================================
function switchTab(n){
  document.querySelectorAll('.modal-tab').forEach((t,i) => t.classList.toggle('active', i===n));
  document.querySelectorAll('.modal-panel').forEach((p,i) => p.classList.toggle('active', i===n));
}

function closeModal(e){
  if(e && e.target !== document.getElementById('overlay')) return;
  document.getElementById('overlay').classList.add('hidden');
  curTask = null;
}

// ESC-näppäin sulkee modalin
document.addEventListener('keydown', e => {
  if(e.key==='Escape') document.getElementById('overlay').classList.add('hidden');
});

// ============================================================
// INIT
// ============================================================
// Tarkista että data on ladattu
window.addEventListener('DOMContentLoaded', () => {
  // Jos MODULES ei ole määritelty (data_security.js ei ladattu), luo tyhjä
  if(typeof MODULES === 'undefined') window.MODULES = [];
  buildNav();
  showHome();
  updateStats();
});
</script>
